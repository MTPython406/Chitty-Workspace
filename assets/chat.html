<script>
/* ═══════════════════════════════════════════════════════════════════
   SVG icon helpers
   ═══════════════════════════════════════════════════════════════════ */
const ICONS = {
  chat: '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>',
  send: '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>',
  close: '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>',
  history: '<svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>',
  clock: '<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>',
  robot: '<svg viewBox="0 0 24 24"><path d="M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7.5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.83 13 9 13s-1.5-.67-1.5-1.5zM16 17H8v-2h8v2zm-1-4c-.83 0-1.5-.67-1.5-1.5S14.17 10 15 10s1.5.67 1.5 1.5S15.83 13 15 13z"/></svg>',
  newSession: '<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>',
};

/* ═══════════════════════════════════════════════════════════════════
   Application state & logic
   ═══════════════════════════════════════════════════════════════════ */
const MAX_PANELS = 10;
let panelIdCounter = 0;

const App = {
  state: {
    panels: [],
    activePanelId: null,
    focusedIndex: 0,
    panelScrollPositions: {},
    panelDrafts: {},
    providers: [],
    models: [],
    userModels: [],
    discoveredModels: [],
    selectedProvider: null,
    selectedModel: null,
    agents: [],
    packages: [],
    availableTools: [],
    conversations: [],
    actionPanelOpen: false,
    sessionAutoApprove: false, // When true, auto-approve all tool actions for this session
  },

  /* ── Init ───────────────────────────────────────────────────────── */
  async init() {
    this.loadTheme();
    this.bindGlobalEvents();
    this.initBrowserWs();
    await this.loadProviders();
    await this.loadAllUserModels();
    await this.loadAgents();
    await this.loadPackages();
    await this.loadConversations();
    this.addPanel();
    document.addEventListener('click', () => this.closeAllPopovers());
  },

  /* ── Theme ──────────────────────────────────────────────────────── */
  loadTheme() {
    const saved = localStorage.getItem('chitty-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    this.updateThemeIcon(saved);
  },

  toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('chitty-theme', next);
    this.updateThemeIcon(next);
  },

  updateThemeIcon(theme) {
    document.getElementById('theme-icon-sun').style.display = theme === 'dark' ? 'none' : 'inline';
    document.getElementById('theme-icon-moon').style.display = theme === 'dark' ? 'inline' : 'none';
  },

  bindGlobalEvents() {
    document.getElementById('add-panel-btn').addEventListener('click', () => this.addPanel());
    document.getElementById('settings-btn').addEventListener('click', () => this.openSettings());
    document.getElementById('settings-close').addEventListener('click', () => this.closeSettings());
    document.getElementById('theme-toggle-btn').addEventListener('click', () => this.toggleTheme());
    document.getElementById('settings-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) this.closeSettings();
    });
    document.getElementById('action-toggle').addEventListener('click', () => this.toggleActionPanel());
    document.getElementById('action-close').addEventListener('click', () => this.toggleActionPanel(false));
    document.getElementById('activity-clear').addEventListener('click', () => this.activityClear());
    // Carousel navigation
    document.getElementById('carousel-prev').addEventListener('click', () => this.focusPrev());
    document.getElementById('carousel-next').addEventListener('click', () => this.focusNext());
    document.querySelectorAll('.action-tab').forEach(tab => {
      tab.addEventListener('click', () => this.switchActionTab(tab.dataset.actionTab));
    });
    // (dynamic views are bound inline via onclick)
    document.getElementById('provider-select')?.addEventListener('change', e => {
      this.state.selectedProvider = e.target.value;
      this.loadModels(e.target.value);
    });
    document.getElementById('model-select')?.addEventListener('change', e => {
      this.state.selectedModel = e.target.value;
    });
    // Settings tabs
    document.querySelectorAll('.settings-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.settings-tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'tokens') this.renderTokenSettings();
        if (tab.dataset.tab === 'marketplace') this.renderMarketplaceSettings();
      });
    });
    window.addEventListener('resize', () => this.layoutCarousel());
    // Keyboard shortcuts for carousel
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === ']') { e.preventDefault(); this.focusNext(); }
      if (e.ctrlKey && e.key === '[') { e.preventDefault(); this.focusPrev(); }
      if (e.key === 'Escape' && this.state.actionPanelOpen) { this.toggleActionPanel(false); }
    });

    // Action Panel resize handle
    const resizeHandle = document.getElementById('action-panel-resize');
    const actionPanel = document.getElementById('action-panel');
    if (resizeHandle && actionPanel) {
      // Restore saved width — only set CSS variable, not direct style
      // Direct style is applied when panel opens via toggleActionPanel
      const workspace = document.getElementById('workspace');
      const savedWidth = localStorage.getItem('chitty-action-panel-width');
      if (savedWidth) {
        workspace.style.setProperty('--action-panel-width', savedWidth);
      }

      const carouselRail = document.getElementById('carousel-rail');
      let dragging = false;
      resizeHandle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragging = true;
        resizeHandle.classList.add('dragging');
        actionPanel.classList.add('resizing');
        if (carouselRail) carouselRail.classList.add('resizing');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      const setWidth = (px) => {
        const val = px + 'px';
        workspace.style.setProperty('--action-panel-width', val);
        // Directly set both elements to stay perfectly in sync
        actionPanel.style.width = val;
        if (carouselRail && carouselRail.classList.contains('action-open')) {
          carouselRail.style.marginRight = val;
        }
      };
      const clearWidth = () => {
        workspace.style.removeProperty('--action-panel-width');
        actionPanel.style.width = '';
        if (carouselRail) carouselRail.style.marginRight = '';
      };

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const maxW = window.innerWidth - 480;
        const minW = 300;
        setWidth(Math.max(minW, Math.min(maxW, window.innerWidth - e.clientX)));
        App.layoutCarousel(); // Reflow chat panel live during drag
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        resizeHandle.classList.remove('dragging');
        actionPanel.classList.remove('resizing');
        if (carouselRail) carouselRail.classList.remove('resizing');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        // Persist
        const w = actionPanel.style.width;
        if (w) localStorage.setItem('chitty-action-panel-width', w);
      });
      // Double-click to reset
      resizeHandle.addEventListener('dblclick', () => {
        clearWidth();
        localStorage.removeItem('chitty-action-panel-width');
      });
    }
  },

  /* ── Data loading ───────────────────────────────────────────────── */
  async loadProviders() {
    try {
      const resp = await fetch('/api/providers');
      this.state.providers = await resp.json();
      this.renderProviderSelect();
      const cfg = this.state.providers.find(p => p.has_key);
      if (cfg) {
        this.state.selectedProvider = cfg.provider_id;
        const ps = document.getElementById('provider-select');
        if (ps) ps.value = cfg.provider_id;
        await this.loadModels(cfg.provider_id);
      } else if (this.state.providers.length) {
        this.state.selectedProvider = this.state.providers[0].provider_id;
        const ps2 = document.getElementById('provider-select');
        if (ps2) ps2.value = this.state.providers[0].provider_id;
      }
    } catch (e) { console.error('loadProviders:', e); }
  },

  async loadModels(pid) {
    try {
      const resp = await fetch(`/api/providers/${pid}/models`);
      const data = await resp.json();
      this.state.models = data.models || [];
      this.renderModelSelect();
      if (this.state.models.length) {
        // Prefer default model, then first
        const def = this.state.models.find(m => m.is_default);
        const sel = def || this.state.models[0];
        this.state.selectedModel = sel.model_id || sel.id;
        const ms = document.getElementById('model-select');
        if (ms) ms.value = this.state.selectedModel;
      }
    } catch (e) { console.error('loadModels:', e); }
  },

  async loadAllUserModels() {
    try {
      const resp = await fetch('/api/models');
      const data = await resp.json();
      this.state.userModels = data.models || [];
    } catch (e) { console.error('loadUserModels:', e); }
    // Also load Ollama models for the unified dropdown
    try {
      const or = await fetch('/api/local/ollama/models');
      if (or.ok) {
        const od = await or.json();
        this._ollamaModels = od.models || [];
      }
    } catch (_) { this._ollamaModels = []; }
    this.renderModelSelect();
  },

  async loadConversations() {
    try {
      const resp = await fetch('/api/conversations');
      this.state.conversations = await resp.json();
    } catch (e) { console.error('loadConversations:', e); }
  },

  /* ── Panel management ───────────────────────────────────────────── */
  addPanel() {
    if (this.state.panels.length >= MAX_PANELS) return;
    const id = 'panel_' + (++panelIdCounter);
    const savedPath = localStorage.getItem('chitty-default-project-path') || null;
    this.state.panels.push({
      id, name: 'Chat', conversationId: null, messages: [], isStreaming: false, selectedAgent: null, projectPath: savedPath,
    });
    // Focus the new panel
    this.state.focusedIndex = this.state.panels.length - 1;
    this.state.activePanelId = id;
    this.renderWorkspace();
    this.updateSubtitle();
    document.getElementById('add-panel-btn').disabled = this.state.panels.length >= MAX_PANELS;
  },

  closePanel(panelId) {
    if (this.state.panels.length <= 1) return;
    const closedIndex = this.state.panels.findIndex(p => p.id === panelId);
    this.state.panels = this.state.panels.filter(p => p.id !== panelId);
    // Adjust focused index
    if (this.state.focusedIndex >= this.state.panels.length) {
      this.state.focusedIndex = this.state.panels.length - 1;
    } else if (closedIndex < this.state.focusedIndex) {
      this.state.focusedIndex--;
    }
    this.state.activePanelId = this.state.panels[this.state.focusedIndex]?.id || null;
    this.renderWorkspace();
    this.updateSubtitle();
    document.getElementById('add-panel-btn').disabled = this.state.panels.length >= MAX_PANELS;
  },

  newSession(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;
    // If streaming, don't allow new session
    if (panel.isStreaming) return;
    panel.conversationId = null;
    panel.messages = [];
    panel.name = 'Chitty';
    this.renderWorkspace();
    this.updateSubtitle();
  },

  setActivePanel(panelId) {
    const index = this.state.panels.findIndex(p => p.id === panelId);
    if (index >= 0) this.focusPanel(index);
  },

  getPanel(panelId) {
    return this.state.panels.find(p => p.id === panelId);
  },

  /* ── Carousel engine ──────────────────────────────────────────── */
  layoutCarousel() {
    const rail = document.getElementById('carousel-rail');
    if (!rail) return;
    const panels = rail.querySelectorAll('.panel');
    const n = this.state.panels.length;
    if (n === 0) return;
    const railW = rail.clientWidth;
    const gap = 10;
    const fi = this.state.focusedIndex;

    if (n === 1) {
      // Single panel — cap at 50% on wide screens, fill on small screens
      const maxW = Math.min(railW - 20, Math.max(railW * 0.5, 700));
      const w = maxW;
      const left = (railW - w) / 2;
      panels[0].style.left = left + 'px';
      panels[0].style.width = w + 'px';
      panels[0].className = 'panel focused';
      panels[0].dataset.panelId = this.state.panels[0].id;
    } else if (n === 2) {
      // Two panels — each 48% with gap
      const pw = Math.floor((railW - gap) * 0.48);
      const totalW = pw * 2 + gap;
      const startLeft = (railW - totalW) / 2;
      panels.forEach((el, i) => {
        el.style.left = (startLeft + i * (pw + gap)) + 'px';
        el.style.width = pw + 'px';
        el.className = i === fi ? 'panel focused' : 'panel preview';
        el.dataset.panelId = this.state.panels[i].id;
      });
    } else {
      // 3+ panels — carousel: focused=52%, preview=24%
      const focusW = Math.floor(railW * 0.52);
      const previewW = Math.floor(railW * 0.24) - gap;
      panels.forEach((el, i) => {
        const offset = i - fi;
        el.dataset.panelId = this.state.panels[i].id;
        if (offset === 0) {
          // Focused
          const left = previewW + gap;
          el.style.left = left + 'px';
          el.style.width = focusW + 'px';
          el.className = 'panel focused';
        } else if (offset === -1) {
          // Left preview
          el.style.left = '0px';
          el.style.width = previewW + 'px';
          el.className = 'panel preview';
        } else if (offset === 1) {
          // Right preview
          const left = previewW + gap + focusW + gap;
          el.style.left = left + 'px';
          el.style.width = previewW + 'px';
          el.className = 'panel preview';
        } else {
          // Off-canvas
          const offLeft = offset < 0 ? -400 : railW + 100;
          el.style.left = offLeft + 'px';
          el.style.width = previewW + 'px';
          el.className = 'panel off-canvas';
        }
      });
    }

    // Update nav arrows
    const prevBtn = document.getElementById('carousel-prev');
    const nextBtn = document.getElementById('carousel-next');
    if (prevBtn) prevBtn.classList.toggle('hidden', fi <= 0 || n <= 1);
    if (nextBtn) nextBtn.classList.toggle('hidden', fi >= n - 1 || n <= 1);
  },

  saveCurrentPanelState() {
    const panelId = this.state.activePanelId;
    if (!panelId) return;
    const el = document.querySelector(`.panel[data-panel-id="${panelId}"]`);
    if (!el) return;
    const msgs = el.querySelector('.panel-messages');
    if (msgs) this.state.panelScrollPositions[panelId] = msgs.scrollTop;
    const textarea = el.querySelector('.panel-textarea');
    if (textarea) this.state.panelDrafts[panelId] = textarea.value;
  },

  restoreCurrentPanelState() {
    const panelId = this.state.activePanelId;
    if (!panelId) return;
    const el = document.querySelector(`.panel[data-panel-id="${panelId}"]`);
    if (!el) return;
    const msgs = el.querySelector('.panel-messages');
    if (msgs && this.state.panelScrollPositions[panelId] !== undefined) {
      msgs.scrollTop = this.state.panelScrollPositions[panelId];
    }
    const textarea = el.querySelector('.panel-textarea');
    if (textarea && this.state.panelDrafts[panelId] !== undefined) {
      textarea.value = this.state.panelDrafts[panelId];
    }
  },

  focusPanel(index) {
    const n = this.state.panels.length;
    if (index < 0 || index >= n) return;
    this.saveCurrentPanelState();
    this.state.focusedIndex = index;
    this.state.activePanelId = this.state.panels[index].id;
    this.layoutCarousel();
    this.restoreCurrentPanelState();
  },

  focusNext() {
    if (this.state.focusedIndex < this.state.panels.length - 1) {
      this.focusPanel(this.state.focusedIndex + 1);
    }
  },

  focusPrev() {
    if (this.state.focusedIndex > 0) {
      this.focusPanel(this.state.focusedIndex - 1);
    }
  },

  /* ── Chat actions ───────────────────────────────────────────────── */
  async loadConversationIntoPanel(panelId, convId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;
    try {
      const resp = await fetch(`/api/conversations/${convId}`);
      const data = await resp.json();
      panel.conversationId = convId;
      panel.name = data.title || 'Chat';
      panel.messages = (data.messages || []).filter(m => m.role !== 'system');
      this.renderPanel(panelId);
    } catch (e) { console.error('loadConv:', e); }
  },

  newChatInPanel(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;
    panel.conversationId = null;
    panel.name = 'Chat';
    panel.messages = [];
    this.renderPanel(panelId);
  },

  async sendMessageInPanel(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel || panel.isStreaming) return;
    const textarea = document.querySelector(`[data-panel-id="${panelId}"] .panel-textarea`);
    if (!textarea) return;
    const text = textarea.value.trim();
    if (!text) return;

    // Slash command interception — handle /commands before sending to LLM
    if (text.startsWith('/')) {
      textarea.value = '';
      textarea.style.height = 'auto';
      this.handleSlashCommand(panelId, text);
      return;
    }

    if (!this.state.selectedProvider || !this.state.selectedModel) {
      panel.messages.push({ role: 'system', content: 'Error: Select a provider and model. Add your API key in Settings.' });
      this.renderPanel(panelId);
      return;
    }

    // Prompt for project path if not set — show inline card
    if (!panel.projectPath) {
      const panelBody = document.querySelector(`[data-panel-id="${panelId}"] .panel-body`);
      // Remove existing prompt if any
      const existing = panelBody?.querySelector('.project-path-prompt');
      if (existing) existing.remove();
      if (panelBody) {
        const card = document.createElement('div');
        card.className = 'project-path-prompt';
        card.innerHTML = `
          <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <div class="project-path-prompt-text">
            <div class="project-path-prompt-title">Set a project path</div>
            <div class="project-path-prompt-sub">The agent uses this as its working directory for files and commands.</div>
            <div class="project-path-prompt-input">
              <input type="text" placeholder="e.g. C:\\my_project" />
              <button class="project-path-prompt-btn">Set Path</button>
            </div>
          </div>`;
        panelBody.insertBefore(card, panelBody.firstChild);
        const pathInput = card.querySelector('input');
        const setBtn = card.querySelector('button');
        pathInput.focus();
        const applyPath = () => {
          const val = pathInput.value.trim();
          if (!val) return;
          panel.projectPath = val;
          localStorage.setItem('chitty-default-project-path', val);
          const headerInput = document.querySelector(`[data-panel-id="${panelId}"] .panel-project-path`);
          if (headerInput) headerInput.value = val;
          card.remove();
        };
        setBtn.addEventListener('click', applyPath);
        pathInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyPath(); });
      }
      return;
    }

    textarea.value = '';
    textarea.style.height = 'auto';
    panel.isStreaming = true;
    this.setActivePanel(panelId);

    panel.messages.push({ role: 'user', content: text });
    panel.messages.push({ role: 'assistant', content: '', streaming: true });
    this.renderPanel(panelId);

    // Activity log
    this.activitySetStatus(true, `Streaming — ${this.state.selectedProvider}/${this.state.selectedModel}`);
    this.activityLog('info', `<span class="hl">Chat started</span> <span class="dim">provider=${esc(this.state.selectedProvider)} model=${esc(this.state.selectedModel)}${panel.selectedAgent ? ' agent=' + esc(panel.selectedAgent) : ''}</span>`);
    this.activityLog('llm', `<span class="hl">User message</span> <span class="dim">(${text.length} chars)</span>`);

    const sendBtn = document.querySelector(`[data-panel-id="${panelId}"] .panel-send-btn`);
    if (sendBtn) sendBtn.disabled = true;

    try {
      const reqBody = {
        conversation_id: panel.conversationId,
        message: text,
        provider: this.state.selectedProvider,
        model: this.state.selectedModel,
      };
      if (panel.selectedAgent) reqBody.agent_id = panel.selectedAgent;
      if (panel.projectPath) reqBody.project_path = panel.projectPath;

      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(reqBody),
      });
      if (!response.ok) throw new Error(await response.text());

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let assistantText = '';
      let lastEventWasToolResult = false;
      let toolCalls = {};  // id -> { name, args, result, success, duration }

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        for (const part of parts) {
          const lines = part.split('\n');
          let evType = '', evData = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) evType = line.slice(7);
            else if (line.startsWith('data: ')) evData = line.slice(6);
          }
          if (!evData) continue;
          try {
            const parsed = JSON.parse(evData);
            if (evType === 'meta') {
              if (parsed.conversation_id) panel.conversationId = parsed.conversation_id;
              this.activityLog('meta', `<span class="hl">Conversation</span> <span class="dim">${esc(parsed.conversation_id || '')}</span>`);
            } else if (evType === 'iteration') {
              this.activityLog('iter', `<span class="hl">Iteration ${parsed.iteration}/${parsed.max_iterations}</span>`);
              if (parsed.iteration > 1) {
                this.appendToolBlockInPanel(panelId,
                  `<div class="iteration-badge">Iteration ${parsed.iteration}/${parsed.max_iterations}</div>`);
              }
            } else if (evType === 'thinking') {
              const tc = parsed.content || '';
              if (tc.startsWith('PROMPT[')) {
                this.activityLog('llm', `${esc(tc)}`);
              } else if (tc.startsWith('LLM returned:')) {
                this.activityLog('info', `${esc(tc)}`);
              } else if (tc.startsWith('Tool call:')) {
                // Extract tool name from "Tool call: tool_name args=..."
                const toolMatch = tc.match(/^Tool call:\s*(\S+)/);
                const toolTag = toolMatch ? toolMatch[1].substring(0, 12) : 'tool';
                const argsDetail = tc.replace(/^Tool call:\s*\S+\s*args=/, '');
                this.activityLog(toolTag, `<span class="dim">${esc(tc)}</span>`, argsDetail.length > 50 ? argsDetail : null);
              } else if (tc.startsWith('WARNING:')) {
                this.activityLog('error', `${esc(tc)}`);
              } else if (tc.startsWith('Loaded ') || tc.startsWith('Context assembled')) {
                this.activityLog('meta', `${esc(tc)}`);
              } else {
                this.activityLog('llm', `<span class="dim">${esc(tc)}</span>`);
              }
              // Only show thinking in chat if it's not a system/tool message (those go to Activity only)
              if (!tc.startsWith('PROMPT[') && !tc.startsWith('LLM returned') && !tc.startsWith('Tool call:') && !tc.startsWith('WARNING:') && !tc.startsWith('Loaded ') && !tc.startsWith('Context assembled') && !tc.startsWith('Executing ')) {
                this.appendToolBlockInPanel(panelId,
                  `<div class="thinking-indicator">${esc(tc)}</div>`);
              }
            } else if (evType === 'tool_call_start') {
              toolCalls[parsed.tool_call_id] = { name: parsed.tool_name, args: '', result: null };
              // Use tool name as tag for specificity
              const toolTag = (parsed.tool_name || 'tool').substring(0, 12);
              this.activityLog(toolTag, `<span class="hl">Calling ${esc(parsed.tool_name)}</span> <span class="dim">id=${esc(parsed.tool_call_id)}</span>`);
              // Friendly label for chat panel
              const toolLabels = {
                'web_search': 'Searching the web', 'web_scraper': 'Reading web page',
                'file_reader': 'Reading file', 'file_writer': 'Writing file',
                'terminal': 'Running command', 'browser': 'Using browser',
                'save_memory': 'Saving to memory', 'load_skill': 'Loading skill',
                'code_search': 'Searching code', 'create_tool': 'Creating tool',
                'execute_package_tool': 'Running package tool', 'dispatch_agents': 'Dispatching agents',
                'check_session': 'Checking session health', 'install_package': 'Installing package',
                'generate_image': 'Generating image', 'edit_image': 'Editing image',
                'generate_video': 'Generating video', 'text_to_speech': 'Converting to speech',
              };
              const friendlyLabel = toolLabels[parsed.tool_name] || ('Using ' + parsed.tool_name);
              const toolIcons = {
                'web_search': '🔍', 'web_scraper': '🌐', 'file_reader': '📄', 'file_writer': '✏️',
                'terminal': '💻', 'browser': '🌐', 'save_memory': '💾', 'load_skill': '📦',
                'code_search': '🔎', 'create_tool': '🔧', 'check_session': '🩺',
                'execute_package_tool': '📦', 'dispatch_agents': '🤖', 'install_package': '📥',
                'generate_image': '🖼️', 'edit_image': '✏️', 'generate_video': '🎬', 'text_to_speech': '🔊',
              };
              const icon = toolIcons[parsed.tool_name] || '⚡';
              this.appendToolBlockInPanel(panelId,
                `<div class="tool-call-block" data-tool-id="${parsed.tool_call_id}">
                  <div class="tool-call-header" onclick="this.querySelector('.tool-call-chevron')?.classList.toggle('open');this.parentElement.querySelector('.tool-call-body')?.classList.toggle('open')">
                    <span class="tool-call-icon">${icon}</span>
                    <span class="tool-call-label-text">${esc(friendlyLabel)}...</span>
                    <span class="tool-call-spinner"></span>
                  </div>
                  <div class="tool-call-body"></div>
                </div>`);
            } else if (evType === 'tool_call_delta') {
              if (toolCalls[parsed.tool_call_id]) {
                toolCalls[parsed.tool_call_id].args += parsed.arguments || '';
              }
            } else if (evType === 'tool_result') {
              const resultTag = parsed.success ? 'result' : 'error';
              const resultDetail = !parsed.success && parsed.content ? parsed.content.substring(0, 500) : null;
              const entry = this.activityLog(resultTag,
                `<span class="hl">${esc(parsed.tool_name || '?')}</span> ${parsed.success ? '<span style="color:#6a6">OK</span>' : '<span style="color:#e55">FAIL</span>'} <span class="dim">${parsed.duration_ms || 0}ms, ${(parsed.content || '').length} chars</span>`,
                resultDetail);
              if (!parsed.success && entry) entry.classList.add('error-highlight');
              const tc = toolCalls[parsed.tool_call_id];
              if (tc) {
                tc.result = parsed.content;
                tc.success = parsed.success;
                tc.duration = parsed.duration_ms;
              }
              // Update chat panel tool block: replace spinner with status, update label
              const toolBlock = document.querySelector(`[data-panel-id="${panelId}"] .tool-call-block[data-tool-id="${parsed.tool_call_id}"]`);
              if (toolBlock) {
                const spinner = toolBlock.querySelector('.tool-call-spinner');
                if (spinner) {
                  if (parsed.success) {
                    spinner.outerHTML = `<span class="tool-call-status success">✓ ${parsed.duration_ms || 0}ms</span>`;
                  } else {
                    spinner.outerHTML = `<span class="tool-call-status error">✗ failed</span>`;
                  }
                }
                // Update label text from "Searching..." to past tense
                const labelEl = toolBlock.querySelector('.tool-call-label-text');
                if (labelEl) {
                  const txt = labelEl.textContent.replace('...', '');
                  labelEl.textContent = parsed.success ? txt : txt + ' — failed';
                  if (!parsed.success) labelEl.style.color = 'var(--danger)';
                }
                // Add chevron for expand
                const header = toolBlock.querySelector('.tool-call-header');
                if (header && !header.querySelector('.tool-call-chevron')) {
                  const chevron = document.createElement('span');
                  chevron.className = 'tool-call-chevron';
                  chevron.innerHTML = '&#9654;';
                  header.appendChild(chevron);
                }
                // Populate body with result preview (or render media inline)
                const body = toolBlock.querySelector('.tool-call-body');
                if (body && tc) {
                  let renderedMedia = false;

                  // ── Inline media rendering for generate_image / edit_image ──
                  if ((parsed.tool_name === 'generate_image' || parsed.tool_name === 'edit_image') && parsed.success) {
                    try {
                      const resultData = typeof parsed.content === 'string' ? JSON.parse(parsed.content) : parsed.content;
                      if (resultData.success && resultData.images && resultData.images.length > 0) {
                        renderedMedia = true;
                        // Use file URL instead of base64 (much lighter for DOM)
                        const gridClass = resultData.images.length === 1 ? 'media-grid single' : 'media-grid';
                        let html = `<div class="generated-media-container">`;
                        html += `<div class="generated-media-label">${parsed.tool_name === 'edit_image' ? 'Edited' : 'Generated'}: ${esc(resultData.prompt || '')}</div>`;
                        html += `<div class="${gridClass}">`;
                        for (const img of resultData.images) {
                          const imgUrl = '/api/media/images/' + encodeURIComponent(img.filename);
                          html += `<img src="${imgUrl}" class="generated-image" alt="${esc(resultData.prompt || 'Generated image')}" onclick="App.viewGeneratedImage('${esc(img.filename)}', '${imgUrl}', '${esc(resultData.prompt || '')}')" />`;
                        }
                        html += `</div></div>`;
                        body.innerHTML = html;
                        body.classList.add('open');
                        const chevron = toolBlock.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');

                        // Attach media to the last assistant message so it survives renderPanel()
                        const lastMsg = panel.messages[panel.messages.length - 1];
                        if (lastMsg && lastMsg.role === 'assistant') {
                          if (!lastMsg.media) lastMsg.media = [];
                          for (const img of resultData.images) {
                            lastMsg.media.push({ type: 'image', filename: img.filename, prompt: resultData.prompt || '' });
                          }
                        }
                      }
                    } catch (mediaErr) { console.error('[MEDIA] image render error:', mediaErr); }
                  }

                  // ── Inline video rendering ──
                  if (parsed.tool_name === 'generate_video' && parsed.success) {
                    try {
                      const resultData = typeof parsed.content === 'string' ? JSON.parse(parsed.content) : parsed.content;
                      if (resultData.success && resultData.video) {
                        renderedMedia = true;
                        const videoUrl = '/api/media/videos/' + encodeURIComponent(resultData.video.filename);
                        body.innerHTML = `
                          <div class="generated-media-container">
                            <div class="generated-media-label">Video: ${esc(resultData.prompt || '')} (${resultData.video.duration || '?'}s)</div>
                            <video class="generated-video" controls preload="metadata">
                              <source src="${videoUrl}" type="video/mp4" />
                            </video>
                          </div>`;
                        body.classList.add('open');
                        const chevron = toolBlock.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                      }
                    } catch (_) {}
                  }

                  // ── Inline audio rendering ──
                  if (parsed.tool_name === 'text_to_speech' && parsed.success) {
                    try {
                      const resultData = typeof parsed.content === 'string' ? JSON.parse(parsed.content) : parsed.content;
                      if (resultData.success && resultData.audio) {
                        renderedMedia = true;
                        const audioUrl = '/api/media/audio/' + encodeURIComponent(resultData.audio.filename);
                        body.innerHTML = `
                          <div class="generated-audio-container">
                            <div class="generated-media-label">Audio: ${esc(resultData.text_preview || '')}</div>
                            <audio controls preload="metadata">
                              <source src="${audioUrl}" type="audio/mpeg" />
                            </audio>
                          </div>`;
                        body.classList.add('open');
                        const chevron = toolBlock.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                      }
                    } catch (_) {}
                  }

                  // ── Browser screenshot rendering ──
                  if (parsed.tool_name === 'browser' && parsed.success) {
                    try {
                      const resultData = JSON.parse(parsed.content);
                      if (resultData.screenshot_base64) {
                        renderedMedia = true;
                        const imgUrl = resultData.screenshot_base64.startsWith('data:')
                          ? resultData.screenshot_base64
                          : 'data:image/png;base64,' + resultData.screenshot_base64;
                        body.innerHTML = `
                          <div class="screenshot-container">
                            <div class="screenshot-label">📸 Screenshot — ${esc(resultData.title || resultData.url || 'page')}</div>
                            <img src="${imgUrl}" class="screenshot-img" alt="Browser screenshot"
                              onclick="this.classList.toggle('expanded')" />
                          </div>`;
                        body.classList.add('open');
                        const chevron = toolBlock.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                        // Also update browser panel screenshot
                        const screenshotEl = document.getElementById('browser-screenshot');
                        const emptyEl = document.getElementById('browser-empty');
                        const iframeEl = document.getElementById('browser-iframe');
                        if (screenshotEl) {
                          screenshotEl.src = imgUrl;
                          screenshotEl.style.display = 'block';
                          if (iframeEl) iframeEl.style.display = 'none';
                          if (emptyEl) emptyEl.style.display = 'none';
                        }
                      }
                    } catch (_) {}
                  }

                  // Fallback: show text preview if no media was rendered
                  if (!renderedMedia) {
                    const argsStr = tc.args ? tc.args.substring(0, 200) : '';
                    const resultStr = (parsed.content || '').substring(0, 500);
                    body.textContent = argsStr ? `Args: ${argsStr}\n\nResult: ${resultStr}` : resultStr;
                  }
                }
              }
              // When the browser tool opens a URL, show it in the Action Panel
              if ((parsed.tool_name === 'browser') && parsed.success && tc) {
                try {
                  const args = JSON.parse(tc.args || '{}');
                  if (args.action === 'open' && args.url) {
                    // Open browser view first (creates the DOM elements)
                    this.openBrowserView();
                    this.toggleActionPanel(true);
                    // Now reference the DOM elements created by openBrowserView
                    const iframe = document.getElementById('browser-iframe');
                    const urlBar = document.getElementById('browser-url');
                    const empty = document.getElementById('browser-empty');
                    const screenshot = document.getElementById('browser-screenshot');
                    const statusText = document.getElementById('browser-status-text');
                    const statusDot = document.getElementById('browser-status-dot');

                    if (urlBar) urlBar.value = args.url;
                    if (statusText) statusText.textContent = 'Connected — ' + new URL(args.url).hostname;
                    if (statusDot) statusDot.className = 'dot connected';

                    // Try loading in iframe first
                    if (iframe) {
                      iframe.src = args.url;
                      iframe.style.display = 'block';
                      if (empty) empty.style.display = 'none';
                      if (screenshot) screenshot.style.display = 'none';

                      // After a short delay, check if iframe actually loaded visible content
                      setTimeout(() => {
                        let canAccess = false;
                        try {
                          const doc = iframe.contentDocument || iframe.contentWindow.document;
                          if (doc && doc.body && doc.body.innerHTML.length > 100) canAccess = true;
                        } catch(e) { /* cross-origin — cannot access DOM */ }

                        // If we can't access the DOM, the site is cross-origin.
                        // Sites like LinkedIn also set X-Frame-Options which means
                        // the iframe renders as blank even though it has dimensions.
                        // Show the fallback with an "Open in Browser" button.
                        if (!canAccess) {
                          // Site can't render in iframe — show Chitty Browser status
                          iframe.style.display = 'none';
                          if (empty) {
                            const hostname = new URL(args.url).hostname;
                            empty.innerHTML = `
                              <div style="text-align:center;padding:20px;">
                                <div style="font-size:32px;margin-bottom:8px;">🌐</div>
                                <div style="font-size:15px;font-weight:600;margin-bottom:4px;">Chitty Browser</div>
                                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
                                  <b>${esc(hostname)}</b> is open in the Chitty Browser window.
                                </div>
                                <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">
                                  Look for the Chrome window on your taskbar.<br>
                                  The agent can click, type, and navigate for you.<br>
                                  You can also interact with the page directly.
                                </div>
                                <div style="padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-secondary);display:inline-block;">
                                  ✅ Agent connected via Chrome DevTools Protocol
                                </div>
                              </div>`;
                            empty.style.display = '';
                          }
                        }
                      }, 3000);
                    }
                  }
                } catch (e) { /* ignore parse errors */ }
              }
              // Handle open_agent_panel UI command
              if (parsed.tool_name === 'open_agent_panel' && parsed.success) {
                try {
                  const cmd = JSON.parse(parsed.content);
                  if (cmd.action === 'open_agent_panel') {
                    // Open a new panel
                    this.addPanel();
                    const newPanel = this.state.panels[this.state.panels.length - 1];
                    if (newPanel) {
                      // Set the agent
                      if (cmd.agent_id) {
                        newPanel.selectedAgent = cmd.agent_id;
                        const agent = this.state.agents.find(a => a.id === cmd.agent_id);
                        if (agent) newPanel.name = agent.name;
                      }
                      this.renderWorkspace();
                      // Auto-send a message if provided
                      if (cmd.message) {
                        const newPanelId = newPanel.id;
                        setTimeout(() => {
                          const ta = document.querySelector(`[data-panel-id="${newPanelId}"] .panel-textarea`);
                          if (ta) { ta.value = cmd.message; this.sendMessageInPanel(newPanelId); }
                        }, 300);
                      }
                    }
                  }
                } catch (_) { /* ignore parse errors */ }
              }
              // Update the tool call block in the DOM
              const block = document.querySelector(`[data-panel-id="${panelId}"] .tool-call-block[data-tool-id="${parsed.tool_call_id}"]`);
              if (block) {
                const status = block.querySelector('.tool-call-status');
                if (status) {
                  status.className = 'tool-call-status ' + (parsed.success ? 'success' : 'error');
                  status.textContent = parsed.success ? 'done' : 'error';
                }
                // Add duration
                const header = block.querySelector('.tool-call-header');
                if (header && parsed.duration_ms !== undefined) {
                  const dur = document.createElement('span');
                  dur.className = 'tool-call-duration';
                  dur.textContent = parsed.duration_ms + 'ms';
                  header.appendChild(dur);
                }
                // Check if this is a browser screenshot — render as image in chat
                let hasScreenshot = false;
                if (parsed.tool_name === 'browser' && parsed.success && parsed.content) {
                  try {
                    const resultData = JSON.parse(parsed.content);
                    if (resultData.screenshot_base64) {
                      hasScreenshot = true;
                      const body = block.querySelector('.tool-call-body');
                      if (body) {
                        const imgUrl = resultData.screenshot_base64.startsWith('data:')
                          ? resultData.screenshot_base64
                          : 'data:image/png;base64,' + resultData.screenshot_base64;
                        body.innerHTML = `
                          <div class="screenshot-container">
                            <div class="screenshot-label">📸 Screenshot — ${esc(resultData.title || resultData.url || 'page')}</div>
                            <img src="${imgUrl}" class="screenshot-img" alt="Browser screenshot"
                              onclick="this.classList.toggle('expanded')" />
                          </div>`;
                        body.classList.add('open');
                        // Auto-expand to show screenshot
                        const chevron = block.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                      }
                      // Also show screenshot in the Browser panel
                      const screenshotEl = document.getElementById('browser-screenshot');
                      const emptyEl = document.getElementById('browser-empty');
                      const iframeEl = document.getElementById('browser-iframe');
                      if (screenshotEl) {
                        screenshotEl.src = resultData.screenshot_base64.startsWith('data:')
                          ? resultData.screenshot_base64
                          : 'data:image/png;base64,' + resultData.screenshot_base64;
                        screenshotEl.style.display = 'block';
                        if (iframeEl) iframeEl.style.display = 'none';
                        if (emptyEl) emptyEl.style.display = 'none';
                      }
                    }
                  } catch (_) { /* not JSON or no screenshot */ }
                }

                // ── Generated media rendering ──────────────────────────
                let hasMedia = false;
                if (parsed.tool_name === 'generate_image' || parsed.tool_name === 'edit_image') {
                  try {
                    const resultData = JSON.parse(parsed.content);
                    if (resultData.success && resultData.images && resultData.images.length > 0) {
                      hasMedia = true;
                      const body = block.querySelector('.tool-call-body');
                      if (body) {
                        const gridClass = resultData.images.length === 1 ? 'media-grid single' : 'media-grid';
                        let html = `<div class="generated-media-container">`;
                        html += `<div class="generated-media-label">${parsed.tool_name === 'edit_image' ? 'Edited' : 'Generated'}: ${esc(resultData.prompt || '')}</div>`;
                        html += `<div class="${gridClass}">`;
                        for (const img of resultData.images) {
                          const dataUrl = img.base64.startsWith('data:') ? img.base64 : 'data:image/png;base64,' + img.base64;
                          html += `<img src="${dataUrl}" class="generated-image" alt="${esc(resultData.prompt || 'Generated image')}" onclick="App.viewGeneratedImage('${esc(img.filename)}', this.src, '${esc(resultData.prompt || '')}')" />`;
                        }
                        html += `</div></div>`;
                        body.innerHTML = html;
                        body.classList.add('open');
                        const chevron = block.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                      }
                    }
                  } catch (_) {}
                }
                if (parsed.tool_name === 'generate_video') {
                  try {
                    const resultData = JSON.parse(parsed.content);
                    if (resultData.success && resultData.video) {
                      hasMedia = true;
                      const body = block.querySelector('.tool-call-body');
                      if (body) {
                        const dataUrl = 'data:video/mp4;base64,' + resultData.video.base64;
                        body.innerHTML = `
                          <div class="generated-media-container">
                            <div class="generated-media-label">Video: ${esc(resultData.prompt || '')} (${resultData.video.duration || '?'}s)</div>
                            <video class="generated-video" controls preload="metadata">
                              <source src="${dataUrl}" type="video/mp4" />
                            </video>
                          </div>`;
                        body.classList.add('open');
                        const chevron = block.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                      }
                    }
                  } catch (_) {}
                }
                if (parsed.tool_name === 'text_to_speech') {
                  try {
                    const resultData = JSON.parse(parsed.content);
                    if (resultData.success && resultData.audio) {
                      hasMedia = true;
                      const body = block.querySelector('.tool-call-body');
                      if (body) {
                        const dataUrl = 'data:audio/mpeg;base64,' + resultData.audio.base64;
                        body.innerHTML = `
                          <div class="generated-audio-container">
                            <div class="generated-media-label">Audio: ${esc(resultData.text_preview || '')}</div>
                            <audio controls preload="metadata">
                              <source src="${dataUrl}" type="audio/mpeg" />
                            </audio>
                          </div>`;
                        body.classList.add('open');
                        const chevron = block.querySelector('.tool-call-chevron');
                        if (chevron) chevron.classList.add('open');
                      }
                    }
                  } catch (_) {}
                }

                // Set body content (preview) — skip if we rendered a screenshot or media
                if (!hasScreenshot && !hasMedia) {
                  const body = block.querySelector('.tool-call-body');
                  if (body) {
                    const preview = (parsed.content || '').substring(0, 500);
                    body.textContent = preview + (parsed.content?.length > 500 ? '\n...' : '');
                  }
                }
              }
              lastEventWasToolResult = true;
            } else if (evType === 'text' && parsed.content) {
              // Insert paragraph break between iterations (after tool results)
              if (lastEventWasToolResult && assistantText.length > 0) {
                assistantText += '\n\n';
              }
              lastEventWasToolResult = false;
              assistantText += parsed.content;
              const last = panel.messages[panel.messages.length - 1];
              if (last?.role === 'assistant') last.content = assistantText;
              this.renderStreamingInPanel(panelId, assistantText);
              // Log text milestones (not every chunk)
              if (!this._lastTextLog || assistantText.length - this._lastTextLog >= 500) {
                this.activityLog('llm', `<span class="dim">Streaming response... ${assistantText.length} chars</span>`);
                this._lastTextLog = assistantText.length;
              }
            } else if (evType === 'approval_request') {
              // ── Action Approval Card ──────────────────────────
              const approvalId = parsed.approval_id;
              const toolName = parsed.tool_name || 'unknown';
              const description = parsed.action_description || 'Perform action';
              const details = parsed.details || {};
              const icon = details.icon || '🔒';

              // Session auto-approve: automatically respond without user interaction
              if (this.state.sessionAutoApprove) {
                this.activityLog('tool', `<span style="color:#10b981">✓ AUTO</span> ${esc(description)}`);
                const autoCardHtml = `
                  <div class="approval-card resolved" data-approval-id="${esc(approvalId)}">
                    <div class="approval-header">
                      <span class="approval-icon">${icon}</span>
                      <span>${esc(description)}</span>
                      <span class="approval-badge" style="background:rgba(16,185,129,0.15);color:#10b981;">Auto-approved</span>
                    </div>
                  </div>`;
                this.appendToolBlockInPanel(panelId, autoCardHtml);
                // Auto-send approval response
                fetch('/api/approval/respond', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ approval_id: approvalId, approved: true }),
                }).catch(e => console.error('Auto-approval failed:', e));
              } else {
                this.activityLog('tool', `<span style="color:#f59e0b">⏸ APPROVAL</span> ${esc(description)}`);

                // Build detail lines
                let detailHtml = '';
                if (details.url) detailHtml += `<div class="approval-detail"><span class="label">URL:</span> ${esc(details.url)}</div>`;
                if (details.selector) detailHtml += `<div class="approval-detail"><span class="label">Element:</span> ${esc(details.selector)}</div>`;
                if (details.text_preview) detailHtml += `<div class="approval-detail"><span class="label">Text:</span> ${esc(details.text_preview)}</div>`;
                if (details.script_preview) detailHtml += `<div class="approval-detail"><span class="label">Script:</span> ${esc(details.script_preview)}</div>`;

                const cardHtml = `
                  <div class="approval-card" data-approval-id="${esc(approvalId)}">
                    <div class="approval-header">
                      <span class="approval-icon">${icon}</span>
                      <span>${esc(description)}</span>
                      <span class="approval-badge">Awaiting Approval</span>
                    </div>
                    ${detailHtml ? `<div class="approval-body">${detailHtml}</div>` : ''}
                    <div class="approval-actions" style="display:flex;gap:6px;align-items:center;">
                      <button class="approval-btn-deny" onclick="App.respondApproval('${esc(approvalId)}', false, this)" style="padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;">Deny</button>
                      <button onclick="App.setSessionAutoApprove(true, '${esc(approvalId)}')" style="flex:1;padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;">Always allow for session</button>
                      <button class="approval-btn-approve" onclick="App.respondApproval('${esc(approvalId)}', true, this)" style="padding:6px 18px;font-size:12px;font-weight:600;border-radius:6px;border:none;background:#e5e7eb;color:#111;cursor:pointer;">Allow once</button>
                    </div>
                  </div>`;
                this.appendToolBlockInPanel(panelId, cardHtml);
              }

            // ═══ Multi-Agent Dispatch Events ═══
            } else if (evType === 'agent_start') {
              const agentName = parsed.agent_name || 'Agent';
              const instruction = parsed.instruction || '';
              // Create agent group in activity tab (instead of flat entry)
              this.activityAgentLog(agentName, 'agent', `<span class="hl">Started</span> <span class="dim">${esc(instruction.substring(0, 100))}</span>`);
              this.appendToolBlockInPanel(panelId,
                `<div class="agent-block" data-agent="${esc(agentName)}">
                  <div class="agent-header">
                    <span class="agent-icon">📦</span>
                    <span class="agent-name">${esc(agentName)}</span>
                    <span class="agent-status thinking">thinking</span>
                  </div>
                  <div class="agent-activity" data-agent-activity="${esc(agentName)}">
                    <div class="agent-instruction">${esc(instruction.substring(0, 200))}</div>
                  </div>
                </div>`);
            } else if (evType === 'agent_text') {
              const agentName = parsed.agent_name || 'Agent';
              const text = parsed.content || '';
              const actDiv = document.querySelector(`[data-agent-activity="${CSS.escape(agentName)}"]`);
              if (actDiv) {
                let textEl = actDiv.querySelector('.agent-text-stream');
                if (!textEl) {
                  textEl = document.createElement('div');
                  textEl.className = 'agent-text-stream';
                  actDiv.appendChild(textEl);
                }
                textEl.textContent += text;
              }
            } else if (evType === 'agent_tool_call') {
              const agentName = parsed.agent_name || 'Agent';
              const toolName = parsed.tool_name || '?';
              this.activityAgentLog(agentName, 'tool', `<span class="hl">${esc(toolName)}</span>`);
              const actDiv = document.querySelector(`[data-agent-activity="${CSS.escape(agentName)}"]`);
              if (actDiv) {
                const el = document.createElement('div');
                el.className = 'agent-tool-call';
                el.innerHTML = `<span class="agent-tool-icon">⚡</span> <b>${esc(toolName)}</b> <span class="agent-tool-status running">running</span>`;
                el.dataset.toolName = toolName;
                actDiv.appendChild(el);
                // Clear any text stream since agent is now acting
                const textEl = actDiv.querySelector('.agent-text-stream');
                if (textEl) textEl.textContent = '';
              }
            } else if (evType === 'agent_tool_result') {
              const agentName = parsed.agent_name || 'Agent';
              const toolName = parsed.tool_name || '?';
              const ok = parsed.success;
              const dur = parsed.duration_ms || 0;
              const preview = parsed.result_preview || '';
              this.activityAgentLog(agentName, ok ? 'result' : 'error', `${esc(toolName)} ${ok ? '<span style="color:#6a6">OK</span>' : '<span style="color:#e55">FAIL</span>'} <span class="dim">${dur}ms</span>`);
              const actDiv = document.querySelector(`[data-agent-activity="${CSS.escape(agentName)}"]`);
              if (actDiv) {
                const toolEl = actDiv.querySelector(`.agent-tool-call[data-tool-name="${CSS.escape(toolName)}"] .agent-tool-status`);
                if (toolEl) {
                  toolEl.className = 'agent-tool-status ' + (ok ? 'done' : 'error');
                  toolEl.textContent = ok ? `✅ ${dur}ms` : '❌ failed';
                }
                // Show result preview
                if (preview) {
                  const previewEl = document.createElement('div');
                  previewEl.className = 'agent-tool-preview';
                  previewEl.textContent = preview.substring(0, 200);
                  const lastTool = actDiv.querySelector(`.agent-tool-call[data-tool-name="${CSS.escape(toolName)}"]`);
                  if (lastTool) lastTool.after(previewEl);
                }
              }
            } else if (evType === 'agent_complete') {
              const agentName = parsed.agent_name || 'Agent';
              this.activityAgentLog(agentName, 'agent', `<span style="color:#22c55e">✅ Completed</span>`);
              this.activityAgentDone(agentName, true);
              const agentBlock = document.querySelector(`.agent-block[data-agent="${CSS.escape(agentName)}"]`);
              if (agentBlock) {
                const statusEl = agentBlock.querySelector('.agent-status');
                if (statusEl) {
                  statusEl.className = 'agent-status done';
                  statusEl.textContent = '✅ done';
                }
                // Collapse activity section with animation
                const actDiv = agentBlock.querySelector('.agent-activity');
                if (actDiv) {
                  // Count tool calls for summary
                  const toolCalls = actDiv.querySelectorAll('.agent-tool-call');
                  const summary = toolCalls.length > 0
                    ? `${toolCalls.length} tool${toolCalls.length > 1 ? 's' : ''} called`
                    : '';
                  // Add summary to header
                  const header = agentBlock.querySelector('.agent-header');
                  if (header && summary) {
                    const summarySpan = document.createElement('span');
                    summarySpan.className = 'agent-summary';
                    summarySpan.textContent = summary;
                    summarySpan.style.cssText = 'font-size:11px;color:var(--text-muted);margin-left:auto;';
                    header.insertBefore(summarySpan, header.querySelector('.agent-status'));
                  }
                  // Collapse after short delay
                  setTimeout(() => {
                    actDiv.style.maxHeight = actDiv.scrollHeight + 'px';
                    requestAnimationFrame(() => {
                      actDiv.style.transition = 'max-height 0.3s ease';
                      actDiv.style.maxHeight = '0';
                      actDiv.style.overflow = 'hidden';
                    });
                  }, 1500);
                  // Make header clickable to toggle
                  if (header) {
                    header.style.cursor = 'pointer';
                    header.onclick = () => {
                      if (actDiv.style.maxHeight === '0px') {
                        actDiv.style.maxHeight = actDiv.scrollHeight + 'px';
                        setTimeout(() => { actDiv.style.maxHeight = 'none'; }, 300);
                      } else {
                        actDiv.style.maxHeight = actDiv.scrollHeight + 'px';
                        requestAnimationFrame(() => { actDiv.style.maxHeight = '0'; });
                      }
                    };
                  }
                }
              }

            } else if (evType === 'context_info') {
              // Update context usage bar
              const pct = parsed.percentage || 0;
              const bar = document.getElementById(`context-bar-${panelId}`);
              if (bar) {
                bar.style.width = pct + '%';
                bar.className = 'context-bar-fill' + (pct > 90 ? ' danger' : pct > 75 ? ' warning' : '');
              }
              // Update token badge next to model selector
              const badge = document.querySelector(`[data-panel-id="${panelId}"] .context-token-badge`);
              if (badge) {
                const used = parsed.used_tokens || 0;
                const max = parsed.max_tokens || 0;
                const label = used >= 1000 ? (used/1000).toFixed(0) + 'K' : used;
                const maxLabel = max >= 1000 ? (max/1000).toFixed(0) + 'K' : max;
                badge.textContent = `${label} / ${maxLabel}`;
                badge.className = 'context-token-badge visible ' + (pct > 90 ? 'danger' : pct > 75 ? 'warning' : 'normal');
                badge.title = `${pct}% context used (${used.toLocaleString()} / ${max.toLocaleString()} tokens). Click to compact.`;
              }
              if (pct > 80) {
                this.activityLog('info', `Context: ${pct}% of ${(parsed.max_tokens||0).toLocaleString()} token limit`);
              }
            } else if (evType === 'error') {
              this.activityLog('error', `<span class="hl">${esc(parsed.error || 'Unknown error')}</span>`);
              panel.messages.push({ role: 'system', content: 'Error: ' + (parsed.error || 'Unknown') });
            } else if (evType === 'done') {
              // done is handled after the loop
            }
          } catch (_) {}
        }
      }

      const last = panel.messages[panel.messages.length - 1];
      if (last) last.streaming = false;
      this._lastTextLog = 0;

      this.activityLog('info', `<span class="hl">Chat completed</span> <span class="dim">${assistantText.length} chars response</span>`);
      this.activitySetStatus(false, 'Idle');

      await this.loadConversations();
      if (!panel.conversationId && this.state.conversations.length) {
        panel.conversationId = this.state.conversations[0].id;
        panel.name = this.state.conversations[0].title || 'Chat';
      }
    } catch (e) {
      const last = panel.messages[panel.messages.length - 1];
      if (last?.role === 'assistant' && !last.content) panel.messages.pop();
      panel.messages.push({ role: 'system', content: 'Error: ' + e.message });
      this.activityLog('error', `<span class="hl">Stream error:</span> ${esc(e.message)}`);
      this.activitySetStatus(false, 'Error');
    } finally {
      panel.isStreaming = false;
      this._lastTextLog = 0;
      this.renderPanel(panelId);
      const ta = document.querySelector(`[data-panel-id="${panelId}"] .panel-textarea`);
      if (ta) ta.focus();
    }
  },

  async deleteConversation(convId) {
    try {
      await fetch(`/api/conversations/${convId}`, { method: 'DELETE' });
      this.state.panels.forEach(p => {
        if (p.conversationId === convId) { p.conversationId = null; p.messages = []; p.name = 'Chat'; }
      });
      await this.loadConversations();
      this.renderWorkspace();
    } catch (e) { console.error('delete:', e); }
  },

  /* ── Action panel ───────────────────────────────────────────────── */
  toggleActionPanel(forceState) {
    const open = forceState !== undefined ? forceState : !this.state.actionPanelOpen;
    this.state.actionPanelOpen = open;
    const ap = document.getElementById('action-panel');
    const rail = document.getElementById('carousel-rail');
    ap.classList.toggle('open', open);
    if (rail) {

  /* ── Activity Log ──────────────────────────────────────────────── */
  activityLog(tag, msg, detail) {
    const log = document.getElementById('activity-log');
    if (!log) return;
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = document.createElement('div');
    // Use 'tool-dyn' class for dynamic tool-name tags that aren't standard
    const stdTags = ['iter','tool','result','error','llm','info','meta','agent'];
    const tagClass = stdTags.includes(tag) ? tag : 'tool-dyn';
    entry.className = 'activity-entry' + (detail ? ' expandable' : '');
    entry.innerHTML = `<span class="activity-time">${time}</span><span class="activity-tag ${tagClass}">${tag}</span><span class="activity-msg">${msg}${detail ? ' <span class="activity-chevron">&#9654;</span>' : ''}</span>`;
    if (detail) {
      const detailDiv = document.createElement('div');
      detailDiv.className = 'activity-detail';
      detailDiv.textContent = typeof detail === 'string' ? detail : JSON.stringify(detail, null, 2);
      entry.appendChild(detailDiv);
      entry.onclick = () => entry.classList.toggle('open');
    }
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    return entry;
  },

  // Log an activity entry nested under an agent group
  activityAgentLog(agentName, tag, msg) {
    const log = document.getElementById('activity-log');
    if (!log) return;
    // Find or create the agent group
    let group = log.querySelector(`.activity-agent-group[data-agent="${CSS.escape(agentName)}"]`);
    if (!group) {
      group = document.createElement('div');
      group.className = 'activity-agent-group';
      group.dataset.agent = agentName;
      group.innerHTML = `
        <div class="activity-agent-group-header" onclick="const b=this.nextElementSibling;b.classList.toggle('collapsed');this.querySelector('.agent-grp-chevron').classList.toggle('open')">
          <span class="agent-grp-chevron open">&#9654;</span>
          <span class="agent-grp-icon">📦</span>
          <span class="agent-grp-name">${esc(agentName)}</span>
          <span class="agent-grp-status working">working</span>
        </div>
        <div class="activity-agent-group-body"></div>`;
      log.appendChild(group);
    }
    const body = group.querySelector('.activity-agent-group-body');
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = document.createElement('div');
    entry.className = 'activity-entry';
    const stdTags = ['iter','tool','result','error','llm','info','meta','agent'];
    const tagClass = stdTags.includes(tag) ? tag : 'tool-dyn';
    entry.innerHTML = `<span class="activity-time">${time}</span><span class="activity-tag ${tagClass}">${tag}</span><span class="activity-msg">${msg}</span>`;
    body.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    return entry;

    if (!log) return;
    const group = log.querySelector(`.activity-agent-group[data-agent="${CSS.escape(agentName)}"]`);

  switchActionTab(tabName) {
    // Legacy: redirect 'agents' or 'packages' to 'marketplace'
    if (tabName === 'agents' || tabName === 'packages') tabName = 'marketplace';
    document.querySelectorAll('.action-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.actionTab === tabName)

    const dynamicView = document.getElementById('dynamic-view');
    const builderBody = document.getElementById('builder-body');
    const providersBody = document.getElementById('providers-body');
    const marketplaceBody = document.getElementById('marketplace-body');
    if (actionBody) actionBody.style.display = tabName === 'activity' ? '' : 'none';
    if (dynamicView) dynamicView.style.display = tabName === 'dynamic' ? 'flex' : 'none';
    if (builderBody) builderBody.style.display = 'none';
    if (providersBody) providersBody.style.display = tabName === 'providers' ? 'block' : 'none';
    if (marketplaceBody) marketplaceBody.style.display = tabName === 'marketplace' ? 'block' : 'none';

          <button onclick="App.iterateArtifact('${id}')" style="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;">Update</button>
        </div>
      </div>`;

    this.openDynamicView('\u{1F4E6}', artifact.title, viewHTML);

  toggleArtifactView(id) {
    const preview = document.getElementById('artifact-preview-area');
    const code = document.getElementById('artifact-code-area');
    const btn = document.getElementById('artifact-toggle-btn');
    if (!preview || !code) return;
    if (preview.style.display === 'none') {
      preview.style.display = 'flex';
      code.style.display = 'none';
      btn.textContent = 'Code';
    } else {
      preview.style.display = 'none';
      code.style.display = 'flex';
      btn.textContent = 'Preview';
    }
  },

  copyArtifact(id) {
    const artifact = _artifacts[id];
    if (!artifact) return;
    navigator.clipboard.writeText(artifact.content).then(() => {
      // Brief visual feedback
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  },

  downloadArtifact(id) {
    const artifact = _artifacts[id];
    if (!artifact) return;
    const ext = artifact.type === 'html' ? '.html' : artifact.type === 'svg' ? '.svg' : artifact.type === 'markdown' ? '.md' : '.txt';
    const filename = artifact.title.replace(/[^a-zA-Z0-9_-]/g, '_').toLowerCase() + ext;
    const blob = new Blob([artifact.content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  },

  manualCompact(panelId) {
    const panel = this.panels ? Object.values(this.panels).find(p => p.id === panelId) : null;
    if (!panel || !panel.conversationId) {
      return alert('No active conversation to compact.');
    }
    // Send a system-level message that triggers the agent to summarize
    panel.messages.push({ role: 'user', content: '/compact' });
    this.renderPanel(panelId);
    // Send as a normal message — the agent will see this and the context management system handles it
    this.sendMessageInPanel(panelId, 'Summarize the conversation so far into a concise recap. Keep key decisions, file paths, and outcomes. Drop verbose tool output.');
  },

  iterateArtifact(id) {
    const artifact = _artifacts[id];
    if (!artifact) return;
    const input = document.getElementById('artifact-iterate-input');
    const changeRequest = input?.value?.trim();
    if (!changeRequest) return;
    input.value = '';

    // Find the focused panel and send the iterate request as a chat message
    const focusedPanel = this.getFocusedPanel();
    if (!focusedPanel) return;

    const msg = `Update the artifact "${artifact.title}" (type: ${artifact.type}): ${changeRequest}\n\nProduce the full updated artifact wrapped in <artifact type="${artifact.type}" title="${artifact.title}"> tags.`;
    this.sendMessageInPanel(focusedPanel.id, msg);
  },
