  renderBuilderPreview() {
    const d = this.builderState.draft;
    const preview = document.getElementById('builder-preview-content');
    if (!preview) return;

    // Name
    let html = `<div class="draft-section">
      <div class="draft-label">Name</div>
      <div class="draft-value ${d.name ? '' : 'placeholder'}">${esc(d.name || 'Not set yet')}</div>
    </div>`;

    // Description
    html += `<div class="draft-section">
      <div class="draft-label">Description</div>
      <div class="draft-value ${d.description ? '' : 'placeholder'}">${esc(d.description || 'Not set yet')}</div>
    </div>`;

    // Instructions
    html += `<div class="draft-section">
      <div class="draft-label">Instructions</div>`;
    if (d.instructions) {
      html += `<div class="draft-instructions-preview">${esc(d.instructions)}</div>`;
    } else {
      html += `<div class="draft-value placeholder">Waiting for builder...</div>`;
    }
    html += `</div>`;

    // Native Tools
    html += `<div class="draft-section">
      <div class="draft-label">Tools</div>`;
    if (d.tools.length) {
      html += `<div class="draft-tools-list">${d.tools.map(t => `<span class="draft-tool-chip">${esc(t)}</span>`).join('')}</div>`;
    } else {
      html += `<div class="draft-value placeholder">None added yet</div>`;
    }
    html += `</div>`;

    // Marketplace Packages
    html += `<div class="draft-section">
      <div class="draft-label">Marketplace Packages</div>`;
    if (d.packages.length) {
      for (const pkg of d.packages) {
        const status = this.builderState.packageStatuses[pkg];
        let badgeHtml = '<span class="status-badge needs-setup">Checking...</span>';
        if (status) {
          if (status.authenticated) {
            badgeHtml = '<span class="status-badge ready">Ready</span>';
          } else {
            badgeHtml = `<span class="status-badge not-auth" onclick="App.openPackageSetup('${esc(pkg)}')" title="Click to complete setup">Setup Required</span>`;
          }
        }
        // Fetch status if not yet checked
        if (!status && !this.builderState.packageStatuses[pkg + '_loading']) {
          this.builderState.packageStatuses[pkg + '_loading'] = true;
          fetch('/api/marketplace/packages/' + encodeURIComponent(pkg) + '/auth-status')
            .then(r => r.json())
            .then(data => {
              this.builderState.packageStatuses[pkg] = data;
              delete this.builderState.packageStatuses[pkg + '_loading'];
              this.renderBuilderPreview();
            })
            .catch(() => {
              this.builderState.packageStatuses[pkg] = { authenticated: false, error: 'Failed to check' };
              delete this.builderState.packageStatuses[pkg + '_loading'];
              this.renderBuilderPreview();
            });
        }
        html += `<div class="draft-package-card">
          <div class="draft-package-info">
            <div class="pkg-name">${esc(pkg)}</div>
          </div>
          ${badgeHtml}
        </div>`;
      }
    } else {
      html += `<div class="draft-value placeholder">None added yet</div>`;
    }
    html += `</div>`;

    // Config
    html += `<div class="draft-section">
      <div class="draft-label">Config</div>
      <div class="draft-value" style="font-size:11px;">
        Iterations: ${d.max_iterations || 10}
        ${d.temperature != null ? ' &middot; Temp: ' + d.temperature : ''}
      </div>
    </div>`;

    // Save + Cancel buttons
    const canSave = d.name && d.instructions;
    html += `<button class="builder-save-btn" id="builder-save" ${canSave ? '' : 'disabled'}>Save Agent</button>`;
    html += `<button class="builder-cancel-btn" id="builder-cancel">Cancel</button>`;

    preview.innerHTML = html;

    document.getElementById('builder-save')?.addEventListener('click', () => this.saveBuilderAgent());
    document.getElementById('builder-cancel')?.addEventListener('click', () => {
      this.closeAgentBuilder();
    });
  },

  updateBuilderDraft(field, value) {
    const d = this.builderState.draft;
    switch (field) {
      case 'name': d.name = value; break;
      case 'description': d.description = value; break;
      case 'instructions': d.instructions = value; break;
      case 'add_tool':
        if (!d.tools.includes(value)) d.tools.push(value);
        break;
      case 'remove_tool':
        d.tools = d.tools.filter(t => t !== value);
        break;
      case 'add_package':
        if (!d.packages.includes(value)) d.packages.push(value);
        break;
      case 'remove_package':
        d.packages = d.packages.filter(p => p !== value);
        break;
      case 'tags':
        d.tags = value.split(',').map(t => t.trim()).filter(Boolean);
        break;
      case 'max_iterations':
        d.max_iterations = parseInt(value) || 10;
        break;
      case 'temperature':
        d.temperature = parseFloat(value) || null;
        break;
    }
    this.renderBuilderPreview();
  },

  async sendBuilderMessage() {
    const input = document.getElementById('builder-input');
    const msg = input?.value?.trim();
    if (!msg) return;

    this.builderState.sending = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('builder-send').disabled = true;

    // Add user message to chat
    const messagesDiv = document.getElementById('builder-messages');
    const userBubble = document.createElement('div');
    userBubble.className = 'builder-msg user';
    userBubble.textContent = msg;
    messagesDiv.appendChild(userBubble);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    // Add typing indicator
    const typingDiv = document.createElement('div');
    typingDiv.className = 'builder-msg assistant';
    typingDiv.id = 'builder-typing';
    typingDiv.innerHTML = '<span class="builder-typing"></span>';
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
      const resp = await fetch('/api/agent-builder/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: msg,
          history: this.builderState.history,
        }),
      });

      if (!resp.ok) throw new Error(await resp.text());

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let assistantText = '';
      let currentEvent = null;

      // Replace typing indicator with streaming bubble
      typingDiv.innerHTML = '';
      typingDiv.id = 'builder-streaming';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('event:')) {
            currentEvent = line.slice(6).trim();
          } else if (line.startsWith('data:') && currentEvent) {
            try {
              const data = JSON.parse(line.slice(5).trim());
              if (currentEvent === 'text' && data.content) {
                assistantText += data.content;
                typingDiv.textContent = assistantText;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
              } else if (currentEvent === 'tool_call_start' && data.tool_name) {
                if (data.tool_name !== 'update_agent_draft' && data.tool_name !== 'ask_user_question') {
                  // Show activity in chat for non-draft, non-question tools
                  const sysMsg = document.createElement('div');
                  sysMsg.className = 'builder-msg system';
                  const labels = {
                    'list_system_tools': 'Checking available tools...',
                    'list_marketplace_packages': 'Checking marketplace packages...',
                    'check_package_status': 'Checking package status...',
                  };
                  sysMsg.textContent = labels[data.tool_name] || `Calling ${data.tool_name}...`;
                  messagesDiv.insertBefore(sysMsg, typingDiv);
                }
              } else if (currentEvent === 'tool_result' && data.tool_name) {
                if (data.tool_name === 'update_agent_draft' && data.content) {
                  // Parse field/value from tool result JSON
                  try {
                    const result = JSON.parse(data.content);
                    if (result.field && result.value !== undefined) {
                      this.updateBuilderDraft(result.field, result.value);
                    }
                  } catch {}
                } else if (data.tool_name === 'ask_user_question' && data.content) {
                  // Render interactive question card
                  try {
                    const q = JSON.parse(data.content);
                    if (q.type === 'question' && q.question && q.options) {
                      // Hide the streaming text div temporarily
                      typingDiv.style.display = 'none';
                      // Create question card
                      const qCard = document.createElement('div');
                      qCard.className = 'builder-question-card';
                      let qHtml = `<div class="builder-question-text">${esc(q.question)}</div><div class="builder-question-options">`;
                      q.options.forEach((opt, idx) => {
                        const recommended = idx === 0 ? ' recommended' : '';
                        qHtml += `<button class="builder-question-option${recommended}" data-option-idx="${idx}">` +
                          `<span class="option-label">${esc(opt.label)}${idx === 0 ? ' <span class="recommended-badge">Recommended</span>' : ''}</span>` +
                          `<span class="option-desc">${esc(opt.description)}</span>` +
                          `</button>`;
                      });
                      qHtml += `</div>`;
                      qCard.innerHTML = qHtml;
                      messagesDiv.insertBefore(qCard, typingDiv);
                      messagesDiv.scrollTop = messagesDiv.scrollHeight;

                      // When user clicks an option, auto-send as next message
                      const self = this;
                      qCard.querySelectorAll('.builder-question-option').forEach(btn => {
                        btn.addEventListener('click', () => {
                          const idx = parseInt(btn.dataset.optionIdx);
                          const chosen = q.options[idx];
                          // Highlight selected option
                          qCard.querySelectorAll('.builder-question-option').forEach(b => b.classList.remove('selected'));
                          btn.classList.add('selected');
                          // Disable all buttons
                          qCard.querySelectorAll('.builder-question-option').forEach(b => b.disabled = true);
                          // Auto-send the answer as the next builder message
                          setTimeout(() => {
                            const input = document.getElementById('builder-input');
                            if (input) {
                              input.value = chosen.label;
                              self.sendBuilderMessage();
                            }
                          }, 300);
                        });
                      });
                    }
                  } catch {}
                }
              } else if (currentEvent === 'error' && data.error) {
                throw new Error(data.error);
              }
            } catch (parseErr) {
              if (parseErr.message && !parseErr.message.includes('JSON')) throw parseErr;
            }
            currentEvent = null;
          }
        }
      }

      // Finalize: add to history
      this.builderState.history.push({ role: 'user', content: msg });
      if (assistantText) {
        this.builderState.history.push({ role: 'assistant', content: assistantText });
      }
    } catch (e) {
      // Show error
      const errDiv = document.createElement('div');
      errDiv.className = 'builder-msg system';
      errDiv.textContent = 'Error: ' + e.message;
      errDiv.style.color = '#ef4444';
      messagesDiv.appendChild(errDiv);
      // Remove typing indicator if still there
      document.getElementById('builder-typing')?.remove();
    }

    this.builderState.sending = false;
    document.getElementById('builder-send').disabled = false;
    document.getElementById('builder-input')?.focus();
  },

    // Navigate to marketplace settings for this package
    this.renderPackageDetail(vendor);

  async saveBuilderAgent() {
    const d = this.builderState.draft;
    if (!d.name) return alert('Agent name is required');
    if (!d.instructions) return alert('Agent instructions are required');

    // Merge package tool names into tools array
    const allTools = [...d.tools];

    // Fetch each package's tool names from marketplace
    for (const pkg of d.packages) {
      try {
        const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(pkg) + '/details');
        const data = await resp.json();
        if (data.tools) {
          for (const t of data.tools) {
            const toolName = t.name || t;
            if (!allTools.includes(toolName)) allTools.push(toolName);
          }
        }
      } catch {}
    }

    const body = {
      name: d.name,
      description: d.description,
      instructions: d.instructions,
      tools: allTools,
      tags: d.tags,
      max_iterations: d.max_iterations || 10,
      temperature: d.temperature,
    };

    try {
      const resp = await fetch('/api/agents', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (resp.ok) {
        this.closeAgentBuilder();
        await this.loadAgents();
      } else {
        alert('Error saving agent: ' + await resp.text());
      }
    } catch (e) { alert('Error: ' + e.message); }
  },

  closeAgentBuilder() {
    const body = document.getElementById('builder-body');
    if (body) body.innerHTML = '';
    this.switchActionTab('activity');
    this.builderState = null;
  },

  async openPackageAgentConfig(agentId, pkgName) {

      fetch('/api/agents/' + encodeURIComponent(agentId)),
      fetch('/api/marketplace/packages/' + encodeURIComponent(pkgName) + '/config'),
      fetch('/api/marketplace/packages'),
    ]);
    const agent = await agentResp.json().catch(() => null);
    const config = await configResp.json().catch(() => ({}));
    const pkgsData = await pkgResp.json().catch(() => ({ packages: [] }));
    const pkg = (pkgsData.packages || []).find(p => p.name === pkgName) || {};

    const displayName = pkg.display_name || pkgName;
    const persona = agent?.persona || '';
    const featureFlags = pkg.feature_flags || [];
    const resources = pkg.configurable_resources || [];
    const savedFeatures = config.features || {};
    const savedResources = config.resources || {};

    let html = `<div style="padding:16px;">
      <h3 style="margin:0 0 4px;">${esc(displayName)} Agent</h3>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">Package: ${esc(pkgName)} &middot; Agent ID: ${esc(agentId)}</div>

      <div style="margin-bottom:16px;">
        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Persona</label>
        <textarea id="pac-persona" style="width:100%;height:80px;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;resize:vertical;background:var(--bg-card);color:var(--text-primary);">${esc(persona)}</textarea>
      </div>`;

    // Feature flags
    if (featureFlags.length) {
      html += '<div style="margin-bottom:16px;"><label style="font-size:12px;font-weight:600;display:block;margin-bottom:8px;">Features</label>';
      for (const f of featureFlags) {
        const checked = (f.id in savedFeatures) ? savedFeatures[f.id] : f.default_enabled;
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <input type="checkbox" class="pac-feature" data-id="${esc(f.id)}" ${checked ? 'checked' : ''}>
          <div><span style="font-size:12px;font-weight:500;">${esc(f.label)}</span>
          ${f.description ? '<div style="font-size:11px;color:var(--text-muted);">' + esc(f.description) + '</div>' : ''}</div>
        </div>`;
      }
      html += '</div>';
    }

    // Advanced section (collapsed)
    html += `<details style="margin-bottom:16px;">
      <summary style="font-size:12px;font-weight:600;cursor:pointer;color:var(--text-secondary);">Advanced Settings</summary>
      <div style="padding:12px 0;">
        <div style="display:flex;gap:12px;margin-bottom:8px;">
          <div style="flex:1;"><label style="font-size:11px;color:var(--text-muted);">Provider</label>
            <input id="pac-provider" type="text" value="${esc(agent?.preferred_provider || '')}" placeholder="default" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-card);color:var(--text-primary);"></div>
          <div style="flex:1;"><label style="font-size:11px;color:var(--text-muted);">Model</label>
            <input id="pac-model" type="text" value="${esc(agent?.preferred_model || '')}" placeholder="default" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-card);color:var(--text-primary);"></div>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:8px;">
          <div style="flex:1;"><label style="font-size:11px;color:var(--text-muted);">Max Iterations</label>
            <input id="pac-iters" type="number" value="${agent?.max_iterations || 10}" min="1" max="50" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-card);color:var(--text-primary);"></div>
          <div style="flex:1;"><label style="font-size:11px;color:var(--text-muted);">Temperature</label>
            <input id="pac-temp" type="number" value="${agent?.temperature || ''}" min="0" max="2" step="0.1" placeholder="default" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-card);color:var(--text-primary);"></div>
        </div>
        <div><label style="font-size:11px;color:var(--text-muted);">Approval Mode</label>
          <select id="pac-approval" style="width:100%;padding:6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg-card);color:var(--text-primary);">
            <option value="prompt" ${(agent?.approval_mode || 'prompt') === 'prompt' ? 'selected' : ''}>Prompt (ask user)</option>
            <option value="auto" ${agent?.approval_mode === 'auto' ? 'selected' : ''}>Auto (trust agent)</option>
          </select>
        </div>
      </div>
    </details>

    <div style="display:flex;gap:8px;">
      <button id="pac-save-btn" style="flex:1;padding:10px;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;">Save Configuration</button>
      <button id="pac-back-btn" style="padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-secondary);">Back</button>
    </div>
    </div>`;

    openDynamicView('&#9881;', displayName + ' Settings', html);

    // Save handler
    document.getElementById('pac-save-btn')?.addEventListener('click', async () => {
      const features = {};
      document.querySelectorAll('.pac-feature').forEach(cb => { features[cb.dataset.id] = cb.checked; });

      // Save package config (features + resources)
      await fetch('/api/marketplace/packages/' + encodeURIComponent(pkgName) + '/config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ features, resources: savedResources }),
      });

      // Save agent settings
      const agentUpdate = {
        name: displayName,
        description: pkg.description || '',

      };
      await fetch('/api/agents/' + encodeURIComponent(agentId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(agentUpdate),
      });

      closeDynamicView();
      this.renderMarketplacePanel();
    });

    document.getElementById('pac-back-btn')?.addEventListener('click', () => {
      closeDynamicView();
    });
  },

  async renderMarketplaceSettings() {

  async _renderMarketplace(container) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">Loading marketplace...</div>';

    try {
      // Fetch both installed packages and registry catalog in parallel
      const [installedResp, registryResp] = await Promise.all([
        fetch('/api/marketplace/packages'),
        fetch('/api/marketplace/registry/packages').catch(() => null),
      ]);
      const installedData = await installedResp.json();
      const installedPackages = installedData.packages || [];
      const installedNames = new Set(installedPackages.map(p => p.name));

      let registryPackages = [];
      if (registryResp && registryResp.ok) {
        const registryData = await registryResp.json();
        registryPackages = registryData.packages || [];
      }

      let html = '';

      // ── Installed Packages ──
      if (installedPackages.length) {
        html += '<div class="model-section-title">Installed Packages</div>';
        for (const pkg of installedPackages) {
          let authHtml = '';
          try {
            const authResp = await fetch('/api/marketplace/packages/' + encodeURIComponent(pkg.name) + '/auth-status');
            const authData = await authResp.json();
            if (authData.authenticated) {
              const projectInfo = authData.project ? ' \u00b7 Project: ' + esc(authData.project) : '';
              authHtml = '<span class="marketplace-auth-status connected">\u2713 Connected' + projectInfo + '</span>';
            } else {
              authHtml = '<span class="marketplace-auth-status disconnected">\u2717 Not authenticated</span>';
            }
          } catch (e) {
            authHtml = '<span class="marketplace-auth-status disconnected">\u2717 Status unknown</span>';
          }

          const toolChips = (pkg.tools || []).map(t =>
            '<span class="marketplace-tool-chip">' + esc(t.display_name || t.name) + '</span>'
          ).join('');

          const configBadge = pkg.has_config
            ? '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(59,130,246,0.1);color:var(--accent);margin-left:6px;">Configurable</span>'
            : '';

          const isReady = authHtml.includes('Connected');
          const setupBtnHtml = isReady
            ? '<button class="primary" data-setup-pkg="' + esc(pkg.name) + '" style="background:#22c55e;border-color:#22c55e;">\u2713 Installed</button>'
            : '<button class="primary" data-setup-pkg="' + esc(pkg.name) + '">Set Up</button>';

          html += '<div class="marketplace-tile">' +
            '<div class="marketplace-tile-header">' +
              '<div class="marketplace-tile-icon" style="background:' + esc(pkg.color || '#666') + ';">\u2601</div>' +
              '<div class="marketplace-tile-info">' +
                '<div class="marketplace-tile-name">' + esc(pkg.display_name) + configBadge + '</div>' +
                '<div class="marketplace-tile-vendor">by ' + esc(pkg.vendor) + ' \u00b7 v' + esc(pkg.version) + ' \u00b7 ' + (pkg.tool_count || pkg.tools.length) + ' tools</div>' +
              '</div>' +
            '</div>' +
            '<div class="marketplace-tile-desc">' + esc(pkg.description) + '</div>' +
            authHtml +
            '<div class="marketplace-tool-list">' + toolChips + '</div>' +
            '<div class="marketplace-tile-actions">' +
              '<button data-detail-pkg="' + esc(pkg.name) + '">Details & Configure</button>' +
              setupBtnHtml +
            '</div>' +
            '<div class="setup-progress" id="setup-' + esc(pkg.name) + '" style="display:none;margin-top:12px;"></div>' +
          '</div>';
        }
      }

      // ── Available from Registry (not installed) ──
      const availablePackages = registryPackages.filter(p => !installedNames.has(p.name));
      if (availablePackages.length) {
        html += '<div class="model-section-title" style="margin-top:20px;">Available Packages</div>';
        for (const pkg of availablePackages) {
          html += '<div class="marketplace-tile">' +
            '<div class="marketplace-tile-header">' +
              '<div class="marketplace-tile-icon" style="background:' + esc(pkg.color || '#666') + ';">\u2601</div>' +
              '<div class="marketplace-tile-info">' +
                '<div class="marketplace-tile-name">' + esc(pkg.display_name) + '</div>' +
                '<div class="marketplace-tile-vendor">by ' + esc(pkg.vendor) + ' \u00b7 v' + esc(pkg.latest_version || '1.0') + ' \u00b7 ' + (pkg.tools_count || 0) + ' tools' +
                  (pkg.downloads ? ' \u00b7 ' + pkg.downloads + ' downloads' : '') +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="marketplace-tile-desc">' + esc(pkg.description) + '</div>' +
            '<div class="marketplace-tile-actions">' +
              '<button class="primary" data-install-pkg="' + esc(pkg.name) + '">Install</button>' +
            '</div>' +
            '<div class="install-progress" id="install-' + esc(pkg.name) + '" style="display:none;margin-top:8px;"></div>' +
          '</div>';
        }
      }

      if (!installedPackages.length && !availablePackages.length) {
        html += '<div class="model-section-title">Marketplace</div>' +
          '<div style="font-size:12px;color:var(--text-muted);padding:16px 0;">No packages available. Check your connection to the marketplace registry.</div>';
      }

      container.innerHTML = html;

      // Bind detail buttons
      const self = this;
      container.querySelectorAll('[data-detail-pkg]').forEach(btn => {
        btn.addEventListener('click', () => self.renderPackageDetail(btn.dataset.detailPkg));
      });

      // Bind install buttons (registry packages)
      container.querySelectorAll('[data-install-pkg]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.installPkg;
          const progressDiv = document.getElementById('install-' + name);
          btn.disabled = true;
          btn.textContent = 'Installing...';
          if (progressDiv) {
            progressDiv.style.display = 'block';
            progressDiv.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Downloading package...</div>';
          }
          try {
            const resp = await fetch('/api/marketplace/registry/install', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, version: 'latest' }),
            });
            const data = await resp.json();
            if (data.success) {
              btn.textContent = '\u2713 Installed';
              btn.style.background = '#22c55e'; btn.style.borderColor = '#22c55e';
              if (progressDiv) progressDiv.innerHTML = '<div style="font-size:12px;color:#22c55e;">' + esc(data.message) + '</div>';
              await new Promise(r => setTimeout(r, 1500));
              self.renderMarketplaceSettings();
            } else {
              btn.textContent = 'Retry';
              btn.disabled = false;
              if (progressDiv) progressDiv.innerHTML = '<div style="font-size:12px;color:#ef4444;">Error: ' + esc(data.error) + '</div>';
            }
          } catch (e) {
            btn.textContent = 'Retry';
            btn.disabled = false;
            if (progressDiv) progressDiv.innerHTML = '<div style="font-size:12px;color:#ef4444;">Error: ' + esc(e.message) + '</div>';
          }
        });
      });

      // Bind setup buttons (installed packages)
      container.querySelectorAll('[data-setup-pkg]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const vendor = btn.dataset.setupPkg;
          const progressDiv = document.getElementById('setup-' + vendor);
          if (!progressDiv) return;

          btn.disabled = true;
          btn.textContent = 'Setting up...';
          progressDiv.style.display = 'block';
          progressDiv.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Checking requirements...</div>';

          let userValues = {};
          let maxAttempts = 3;

          for (let attempt = 0; attempt < maxAttempts; attempt++) {
            try {
              const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ values: userValues }),
              });
              const data = await resp.json();

              let stepsHtml = '';
              let needsInput = false;
              let inputStepId = null;

              for (const step of (data.steps || [])) {
                let icon = '', statusClass = '', extra = '';
                switch (step.status) {
                  case 'already_done': case 'completed':
                    icon = '\u2713'; statusClass = 'color:#22c55e;'; break;
                  case 'failed':
                    icon = '\u2717'; statusClass = 'color:#ef4444;';
                    extra = '<div style="font-size:11px;color:#ef4444;margin:2px 0 0 24px;">' + esc(step.message || '') + '</div>';
                    if (step.help_url) extra += '<div style="font-size:11px;margin:2px 0 0 24px;"><a href="' + esc(step.help_url) + '" target="_blank" style="color:var(--accent);">Help</a></div>';
                    break;
                  case 'needs_input':
                    icon = '?'; statusClass = 'color:var(--accent);';
                    needsInput = true; inputStepId = step.step_id;
                    extra = '<div style="margin:8px 0 0 24px;">' +
                      '<label style="font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px;">' + esc(step.prompt_label || 'Enter value') + '</label>' +
                      '<input type="text" id="setup-input-' + esc(step.step_id) + '" placeholder="' + esc(step.prompt_placeholder || '') + '" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-input);color:var(--text-primary);font-size:12px;width:100%;box-sizing:border-box;" />' +
                      (step.prompt_help ? '<div style="font-size:10px;color:var(--text-muted);margin-top:3px;">' + esc(step.prompt_help) + '</div>' : '') +
                      '<button class="primary" id="setup-submit-' + esc(step.step_id) + '" style="margin-top:6px;padding:5px 14px;font-size:11px;">Continue</button></div>';
                    break;
                  default: icon = '\u25CB'; statusClass = 'color:var(--text-muted);';
                }
                stepsHtml += '<div style="display:flex;align-items:flex-start;gap:8px;margin:6px 0;font-size:12px;"><span style="' + statusClass + 'font-weight:600;width:16px;flex-shrink:0;">' + icon + '</span><span style="color:var(--text-primary);">' + esc(step.label) + '</span></div>' + extra;
              }

              if (data.success) {
                stepsHtml += '<div style="margin-top:10px;font-size:12px;color:#22c55e;font-weight:600;">\u2713 Package ready!</div>';
                progressDiv.innerHTML = stepsHtml;
                btn.textContent = '\u2713 Installed';
                btn.style.background = '#22c55e'; btn.style.borderColor = '#22c55e';
                await new Promise(r => setTimeout(r, 2000));
                self.renderMarketplaceSettings();
                return;
              }

              progressDiv.innerHTML = stepsHtml;

              if (needsInput && inputStepId) {
                btn.textContent = 'Waiting for input...';
                await new Promise((resolve) => {
                  const submitBtn = document.getElementById('setup-submit-' + inputStepId);
                  if (submitBtn) {
                    submitBtn.addEventListener('click', () => {
                      const input = document.getElementById('setup-input-' + inputStepId);
                      if (input && input.value.trim()) {
                        userValues[inputStepId] = input.value.trim();
                        btn.textContent = 'Setting up...';
                        resolve();
                      }
                    });
                  }
                });
                continue;
              }

              btn.textContent = 'Setup incomplete';
              btn.disabled = false;
              return;
            } catch (e) {
              progressDiv.innerHTML = '<div style="font-size:12px;color:#ef4444;">Error: ' + esc(e.message) + '</div>';
              btn.textContent = 'Retry Setup';
              btn.disabled = false;
              return;
            }
          }
        });
      });
    } catch (e) {
      container.innerHTML = '<div style="color:var(--danger);font-size:12px;">Error loading marketplace: ' + e.message + '</div>';
    }
  },

  // ── Package Detail & Configuration Page ─────────────────────────
  async renderPackageDetail(vendor) {
    const container = document.getElementById('marketplace-body') || document.getElementById('marketplace-settings');
    if (!container) return;
    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">Loading package details...</div>';

    try {
      const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/details');
      const data = await resp.json();
      if (data.error) { container.innerHTML = '<div style="color:var(--danger);font-size:12px;">' + esc(data.error) + '</div>'; return; }

      const pkg = data.package || {};
      const tools = data.tools || [];
      const config = data.config || { resources: {}, features: {} };
      const configurableResources = pkg.configurable_resources || [];
      const featureFlags = pkg.feature_flags || [];
      const agentConfig = pkg.agent_config || {};

      // Check OAuth connection status if applicable
      let authStatus = null;
      const oauthProvider = pkg.auth?.oauth_provider;
      if (oauthProvider) {
        try {
          const ar = await fetch('/api/oauth/status/' + encodeURIComponent(oauthProvider));
          if (ar.ok) authStatus = await ar.json();
        } catch (_) {}
      }
      const isConnected = authStatus?.connected === true;

      let html = '<div class="pkg-detail">';

      // Back button
      html += '<button class="pkg-detail-back" id="pkg-back">\u2190 Back to packages</button>';

      // Header with connection status
      html += '<div class="pkg-detail-header">' +
        '<div class="pkg-detail-icon" style="background:' + esc(pkg.color || '#666') + ';">' +
          (pkg.name === 'slack' ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zm10.122 2.521a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zm-1.268 0a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312zm-2.523 10.122a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zm0-1.268a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z"/></svg>'
            : '\u2601') +
        '</div>' +
        '<div style="flex:1;">' +
          '<div class="pkg-detail-title">' + esc(pkg.display_name || pkg.name) + '</div>' +
          '<div class="pkg-detail-meta">' +
            'by ' + esc(pkg.vendor || 'Community') + ' \u00b7 v' + esc(pkg.version || '1.0') +
            (pkg.categories?.length ? ' \u00b7 ' + pkg.categories.map(c => esc(c)).join(', ') : '') +
          '</div>' +
        '</div>' +
        (oauthProvider ? '<button class="pkg-connect-btn ' + (isConnected ? 'connected' : '') + '" id="pkg-connect-toggle">' +
          (isConnected ? 'Disconnect' : 'Connect') + '</button>' : '') +
      '</div>';

      // Connection status banner
      if (oauthProvider) {
        html += '<div class="pkg-connection-status ' + (isConnected ? 'connected' : 'disconnected') + '">' +
          '<span class="pkg-status-dot"></span>' +
          '<span>' + (isConnected ? 'Connected to ' + esc(pkg.display_name || pkg.name) : 'Not connected \u2014 set up credentials and connect') + '</span>' +
        '</div>';
      }

      // ── Fetch skill data for Skills tab ──────────────────────────
      let skillData = null;
      try {
        const skillResp = await fetch('/api/skills/' + encodeURIComponent(pkg.name));
        if (skillResp.ok) skillData = await skillResp.json();
      } catch (_) {}

      // ── Fetch sub-agents for Configuration tab ──────────────────
      const subAgentTemplate = pkg.sub_agent_template;
      let childAgents = [];
      if (subAgentTemplate) {
        try {
          const cr = await fetch('/api/agents/pkg-' + encodeURIComponent(vendor) + '/children');
          if (cr.ok) childAgents = await cr.json();
        } catch (_) {}
      }

      // ── Tab bar ─────────────────────────────────────────────────
      const setupSteps = pkg.setup_steps || [];
      const hasConfig = configurableResources.length || featureFlags.length || !!subAgentTemplate;

      html += '<div class="pkg-tabs">';
      html += '<button class="pkg-tab active" data-pkg-tab="overview">Overview</button>';
      if (setupSteps.length > 0) {
        html += '<button class="pkg-tab" data-pkg-tab="setup">Setup</button>';
      }
      if (skillData) {
        html += '<button class="pkg-tab" data-pkg-tab="skills">Skills</button>';
      }
      if (tools.length > 0) {
        html += '<button class="pkg-tab" data-pkg-tab="tools">Tools</button>';
      }
      if (hasConfig) {
        html += '<button class="pkg-tab" data-pkg-tab="config">Configuration</button>';
      }
      html += '</div>';

      // ── TAB: Overview ───────────────────────────────────────────
      html += '<div class="pkg-tab-content active" id="pkg-tab-overview">';

      const desc = pkg.long_description || pkg.description || '';
      html += '<div class="pkg-detail-section">' +
        '<div class="pkg-detail-desc">' + esc(desc) + '</div>' +
      '</div>';

      if (agentConfig.capabilities && agentConfig.capabilities.length) {
        html += '<div class="pkg-detail-section">' +
          '<div class="pkg-detail-section-title">Capabilities</div>' +
          '<ul class="pkg-detail-capabilities">' +
          agentConfig.capabilities.map(c => '<li>' + esc(c) + '</li>').join('') +
          '</ul></div>';
      }

      if (agentConfig.suggested_prompts && agentConfig.suggested_prompts.length) {
        html += '<div class="pkg-detail-section" style="margin-top:12px;">' +
          '<div class="pkg-detail-section-title">Try These Prompts</div>' +
          '<div>' + agentConfig.suggested_prompts.map(p => '<span class="pkg-prompt-chip">' + esc(p) + '</span>').join('') + '</div>' +
        '</div>';
      }

      html += '</div>'; // close overview tab

      // ── TAB: Setup ──────────────────────────────────────────────
      if (setupSteps.length > 0) {
        html += '<div class="pkg-tab-content" id="pkg-tab-setup">';

        // Hero: prominent Run Setup button at top
        html += '<div class="pkg-setup-hero">' +
          '<button class="pkg-setup-hero-btn" id="pkg-run-setup">\u25b6 Run Setup</button>' +
          '<div class="pkg-setup-hero-status" id="pkg-setup-result"></div>' +
        '</div>';

        // Step checklist
        html += '<div class="pkg-setup-steps" id="pkg-setup-steps">';
        for (const step of setupSteps) {
          const isCredential = !!step.credentials_key;
          const isPrompt = step.prompt_user || isCredential;
          html += '<div class="pkg-setup-step" data-step-id="' + esc(step.id) + '">' +
            '<div class="pkg-setup-step-header">' +
              '<span class="pkg-setup-step-status" id="setup-status-' + esc(step.id) + '">\u25cb</span>' +
              '<span class="pkg-setup-step-label">' + esc(step.label) + '</span>' +
            '</div>';
          if (step.help_text) {
            html += '<div class="pkg-setup-step-help">' + esc(step.help_text) + '</div>';
          }
          if (step.help_url) {
            html += '<div style="margin-top:4px;"><a href="' + esc(step.help_url) + '" target="_blank" style="font-size:11px;color:var(--accent);">Open setup page \u2192</a></div>';
          }
          if (isPrompt) {
            html += '<div class="pkg-setup-step-input">' +
              '<input type="' + (isCredential ? 'password' : 'text') + '" ' +
                'class="pkg-setup-input" data-step="' + esc(step.id) + '" ' +
                'placeholder="' + esc(step.prompt_placeholder || step.prompt_label || '') + '" />' +
            '</div>';
          }
          if (step.id === 'oauth_connect') {
            html += '<div style="margin-top:6px;"><button class="pkg-setup-connect-btn" id="pkg-oauth-btn">' +
              (isConnected ? '\u2713 Connected' : '\u26a1 Connect to ' + esc(pkg.display_name || 'service')) +
            '</button></div>';
          }
          html += '</div>';
        }
        html += '</div>'; // close setup-steps

        html += '</div>'; // close setup tab
      }

      // ── TAB: Skills ─────────────────────────────────────────────
      if (skillData) {
        html += '<div class="pkg-tab-content" id="pkg-tab-skills">';
        html += '<div class="pkg-detail-section">' +
          '<div class="pkg-detail-section-title">' + esc(skillData.name || pkg.name) + '</div>' +
          '<div class="pkg-skill-meta">' + esc(skillData.description || '') + '</div>';

        if (skillData.allowed_tools && skillData.allowed_tools.length) {
          html += '<div class="pkg-detail-section-title" style="font-size:12px;">Allowed Tools</div>' +
            '<div class="pkg-skill-tools">' +
            skillData.allowed_tools.map(t => '<span class="pkg-skill-tool-tag">' + esc(t) + '</span>').join('') +
            '</div>';
        }

        if (skillData.content) {
          html += '<div class="pkg-detail-section-title" style="font-size:12px;">Instructions</div>' +
            '<div class="pkg-skill-content">' + esc(skillData.content) + '</div>';
        }

        html += '</div></div>'; // close skills tab
      }

      // ── TAB: Tools ──────────────────────────────────────────────
      if (tools.length > 0) {
        html += '<div class="pkg-tab-content" id="pkg-tab-tools">';
        html += '<div class="pkg-detail-section">' +
          '<div class="pkg-detail-section-title">Tools <span style="font-size:11px;color:var(--text-muted);font-weight:400;">' + tools.length + '</span></div>';
        for (const tool of tools) {
          const actions = tool.parameters && tool.parameters.action
            ? (tool.parameters.action.description || '').replace(/^.*?:\s*/, '').split(',').map(a => a.trim()).filter(Boolean)
            : [];
          html += '<div class="pkg-tool-card">' +
            '<div class="pkg-tool-card-name">' + esc(tool.display_name || tool.name) + '</div>' +
            '<div class="pkg-tool-card-desc">' + esc(tool.description || '') + '</div>' +
            (actions.length ? '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">' + actions.map(a => '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-muted);">' + esc(a) + '</span>').join('') + '</div>' : '') +
          '</div>';
        }
        html += '</div></div>'; // close tools tab
      }

      // ── TAB: Configuration ──────────────────────────────────────
      if (hasConfig) {
        html += '<div class="pkg-tab-content" id="pkg-tab-config">';

        // Configured Sub-Agents
        if (subAgentTemplate) {
          html += '<div class="pkg-detail-section">' +
            '<div class="pkg-detail-section-title">Configured Agents <span style="font-size:11px;color:var(--text-muted);font-weight:400;">' + childAgents.length + '</span></div>' +
            '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">Each configured dataset creates a focused sub-agent with scoped tools. Select it from the chat dropdown.</div>';

          for (const child of childAgents) {
            html += '<div class="pkg-sub-agent-card">' +
              '<div style="flex:1;">' +
                '<div style="font-weight:600;font-size:13px;">' + esc(child.name) + '</div>' +
                '<div style="font-size:11px;color:var(--text-muted);">' + esc(child.description || '') + '</div>' +
              '</div>' +
              '<div style="display:flex;gap:4px;">' +
                '<button class="discover-btn pkg-sub-agent-delete" data-child-id="' + esc(child.id) + '" style="color:var(--danger);border-color:var(--danger);">Remove</button>' +
              '</div>' +
            '</div>';
          }

          html += '<button class="provider-card-btn" id="pkg-add-sub-agent" style="margin-top:8px;">+ Add Dataset Agent</button>' +
            '</div>';
        }

        // Allowed Resources
        if (configurableResources.length) {
          html += '<div class="pkg-detail-section">' +
            '<div class="pkg-detail-section-title">Allowed Resources</div>' +
            '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">Configure which resources the agent can access. The agent will only operate on resources listed here.</div>';

          for (const res of configurableResources) {
            const savedItems = (config.resources[res.id] || []).map(r => r.id);
            html += '<div class="pkg-resource-section" data-resource-type="' + esc(res.id) + '">' +
              '<div class="pkg-resource-label">' + esc(res.label) + '</div>' +
              (res.description ? '<div class="pkg-resource-desc">' + esc(res.description) + '</div>' : '') +
              '<div class="pkg-resource-list" id="res-list-' + esc(res.id) + '">' +
                savedItems.map(id => '<span class="pkg-resource-tag" data-id="' + esc(id) + '">' + esc(id) + ' <button class="remove-btn" title="Remove">\u00d7</button></span>').join('') +
              '</div>' +
              '<div class="pkg-resource-add">' +
                '<input type="text" id="res-input-' + esc(res.id) + '" placeholder="' + esc(res.placeholder || 'Enter name...') + '" />' +
                '<button onclick="settingsPanel.addResource(\'' + esc(vendor) + '\', \'' + esc(res.id) + '\')">Add</button>' +
                (res.discover_command ? '<button class="discover-btn" onclick="settingsPanel.discoverResources(\'' + esc(vendor) + '\', \'' + esc(res.id) + '\')">Discover</button>' : '') +
              '</div>' +
            '</div>';
          }
          html += '</div>';
        }

        // Feature Flags
        if (featureFlags.length) {
          html += '<div class="pkg-detail-section">' +
            '<div class="pkg-detail-section-title">Feature Flags</div>' +
            '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">Enable or disable specific capabilities. Disabled features cannot be used by the agent.</div>';

          for (const flag of featureFlags) {
            const isEnabled = config.features.hasOwnProperty(flag.id)
              ? config.features[flag.id]
              : flag.default_enabled;
            html += '<div class="pkg-feature-row">' +
              '<div class="pkg-feature-info">' +
                '<div class="pkg-feature-label">' + esc(flag.label) + '</div>' +
                (flag.description ? '<div class="pkg-feature-desc">' + esc(flag.description) + '</div>' : '') +
              '</div>' +
              '<label class="pkg-feature-toggle">' +
                '<input type="checkbox" data-feature="' + esc(flag.id) + '" data-vendor="' + esc(vendor) + '"' +
                (flag.enable_warning ? ' data-warning="' + esc(flag.enable_warning) + '"' : '') +
                (isEnabled ? ' checked' : '') + ' />' +
                '<span class="slider"></span>' +
              '</label>' +
            '</div>';
          }
          html += '</div>';
        }

        // Save Configuration Button
        if (configurableResources.length || featureFlags.length) {
          html += '<div style="display:flex;gap:8px;margin-top:8px;">' +
            '<button class="primary" id="pkg-save-config" style="padding:8px 20px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;">Save Configuration</button>' +
            '<span id="pkg-save-status" style="font-size:12px;color:var(--text-muted);align-self:center;"></span>' +
          '</div>';
        }

        html += '</div>'; // close config tab
      }

      html += '</div>'; // close .pkg-detail
      container.innerHTML = html;

      // ── Bind Events ───────────────────────────────────────────────
      const self = this;

      // Tab switching
      container.querySelectorAll('.pkg-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          container.querySelectorAll('.pkg-tab').forEach(t => t.classList.remove('active'));
          container.querySelectorAll('.pkg-tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          const target = container.querySelector('#pkg-tab-' + tab.dataset.pkgTab);
          if (target) target.classList.add('active');
        });
      });

      // Back button
      document.getElementById('pkg-back').addEventListener('click', () => {
        if (document.getElementById('marketplace-body')?.style.display !== 'none') {
          self.renderMarketplacePanel();
        } else {
          self.renderMarketplaceSettings();
        }
      });

      // Connect/Disconnect OAuth
      const connectBtn = document.getElementById('pkg-connect-toggle');
      if (connectBtn) {
        connectBtn.addEventListener('click', async () => {
          if (isConnected) {
            if (!confirm('Disconnect from ' + (pkg.display_name || vendor) + '?')) return;
            await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/disconnect', { method: 'POST' });
            self.renderPackageDetail(vendor);
          } else {
            // Open OAuth flow
            window.open('/oauth/start/' + encodeURIComponent(oauthProvider), '_blank');
            // Poll for connection
            const poll = setInterval(async () => {
              try {
                const r = await fetch('/api/oauth/status/' + encodeURIComponent(oauthProvider));
                const s = await r.json();
                if (s.connected) { clearInterval(poll); self.renderPackageDetail(vendor); }
              } catch (_) {}
            }, 2000);
            setTimeout(() => clearInterval(poll), 120000);
          }
        });
      }

      // OAuth connect button in setup section
      const oauthBtn = document.getElementById('pkg-oauth-btn');
      if (oauthBtn) {
        oauthBtn.addEventListener('click', () => {
          window.open('/oauth/start/' + encodeURIComponent(oauthProvider), '_blank');
          const poll = setInterval(async () => {
            try {
              const r = await fetch('/api/oauth/status/' + encodeURIComponent(oauthProvider));
              const s = await r.json();
              if (s.connected) { clearInterval(poll); self.renderPackageDetail(vendor); }
            } catch (_) {}
          }, 2000);
          setTimeout(() => clearInterval(poll), 120000);
        });
      }

      // Run Setup button — runs steps sequentially with progress
      const runSetupBtn = document.getElementById('pkg-run-setup');
      if (runSetupBtn) {
        // Auto-check status on load
        (async () => {
          try {
            const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/setup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ mode: 'check_only' }),
            });
            const result = await resp.json();
            for (const step of (result.steps || [])) {
              const el = document.getElementById('setup-status-' + step.step_id);
              if (el && (step.status === 'completed' || step.status === 'already_done')) {
                el.textContent = '\u2713'; el.style.color = '#22c55e';
              }
            }
            if (result.success) {
              runSetupBtn.textContent = '\u2713 Setup Complete';
              runSetupBtn.style.opacity = '0.6';
            }
          } catch (_) {}
        })();

        runSetupBtn.addEventListener('click', async () => {
          runSetupBtn.disabled = true;
          const resultEl = document.getElementById('pkg-setup-result');
          resultEl.textContent = '';

          // Collect input values
          const values = {};
          container.querySelectorAll('.pkg-setup-input').forEach(input => {
            if (input.value.trim()) values[input.dataset.step] = input.value.trim();
          });

          // Run steps sequentially via the backend
          try {
            const steps = setupSteps || [];
            let allDone = true;
            for (const step of steps) {
              const statusEl = document.getElementById('setup-status-' + step.id);
              if (statusEl) { statusEl.textContent = '\u2299'; statusEl.style.color = '#3b82f6'; }
              runSetupBtn.textContent = 'Running: ' + (step.label || step.id) + '...';

              const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: 'execute_step', step_id: step.id, values }),
              });
              const result = await resp.json();
              const stepResult = (result.steps || []).find(s => s.step_id === step.id) || {};

              if (statusEl) {
                if (stepResult.status === 'completed' || stepResult.status === 'already_done') {
                  statusEl.textContent = '\u2713'; statusEl.style.color = '#22c55e';
                } else if (stepResult.status === 'failed') {
                  statusEl.textContent = '\u2717'; statusEl.style.color = '#ef4444';
                  allDone = false;
                  resultEl.textContent = stepResult.message || 'Step failed: ' + step.label;
                  resultEl.style.color = '#ef4444';
                  break;
                } else if (stepResult.status === 'needs_input') {
                  statusEl.textContent = '?'; statusEl.style.color = '#f59e0b';
                  allDone = false;
                  resultEl.textContent = stepResult.message || 'Input needed for: ' + step.label;
                  resultEl.style.color = '#f59e0b';
                  // Highlight the input field
                  const inputEl = container.querySelector('.pkg-setup-input[data-step="' + step.id + '"]');
                  if (inputEl) { inputEl.focus(); inputEl.style.borderColor = '#f59e0b'; }
                  break;
                }
              }
            }
            if (allDone) {
              resultEl.textContent = '\u2713 Setup complete!';
              resultEl.style.color = '#22c55e';
            }
          } catch (e) {
            resultEl.textContent = 'Error: ' + e.message;
            resultEl.style.color = '#ef4444';
          }
          runSetupBtn.disabled = false;
          runSetupBtn.textContent = '\u25b6 Run Setup';
        });
      }

      // Remove resource tags
      container.querySelectorAll('.pkg-resource-tag .remove-btn').forEach(btn => {
        btn.addEventListener('click', () => btn.parentElement.remove());
      });

      // Feature flag warnings
      container.querySelectorAll('.pkg-feature-toggle input[data-warning]').forEach(cb => {
        cb.addEventListener('change', (e) => {
          if (e.target.checked && e.target.dataset.warning) {
            if (!confirm(e.target.dataset.warning)) {
              e.target.checked = false;
            }
          }
        });
      });

      // Save button
      // ── Sub-Agent: Add button → opens form in dynamic view ─────
      const addSubAgentBtn = document.getElementById('pkg-add-sub-agent');
      if (addSubAgentBtn) {
        addSubAgentBtn.addEventListener('click', () => {
          self.openSubAgentForm(vendor, pkg.sub_agent_template);
        });
      }
      // Sub-Agent: Remove buttons
      container.querySelectorAll('.pkg-sub-agent-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const childId = btn.dataset.childId;
          if (!confirm('Remove this sub-agent? This cannot be undone.')) return;
          try {
            await fetch('/api/agents/' + encodeURIComponent(childId), { method: 'DELETE' });
            self.renderPackageDetail(vendor);
            await self.loadAgents();
          } catch (err) { console.error('Delete sub-agent:', err); }
        });
      });

      const saveBtn = document.getElementById('pkg-save-config');
      if (saveBtn) {
        saveBtn.addEventListener('click', async () => {
          const statusEl = document.getElementById('pkg-save-status');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';

          // Collect resources
          const resources = {};
          container.querySelectorAll('.pkg-resource-section').forEach(section => {
            const rType = section.dataset.resourceType;
            const tags = section.querySelectorAll('.pkg-resource-tag');
            resources[rType] = Array.from(tags).map(tag => ({ id: tag.dataset.id }));
          });

          // Collect features
          const features = {};
          container.querySelectorAll('.pkg-feature-toggle input[data-feature]').forEach(cb => {
            features[cb.dataset.feature] = cb.checked;
          });

          try {
            const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/config', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ resources, features }),
            });
            const result = await resp.json();
            if (result.success) {
              statusEl.textContent = '\u2713 Saved';
              statusEl.style.color = '#22c55e';
            } else {
              statusEl.textContent = 'Error: ' + (result.error || 'Unknown');
              statusEl.style.color = '#ef4444';
            }
          } catch (e) {
            statusEl.textContent = 'Error: ' + e.message;
            statusEl.style.color = '#ef4444';
          }
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save Configuration';
        });
      }
    } catch (e) {
      container.innerHTML = '<div style="color:var(--danger);font-size:12px;">Error: ' + e.message + '</div>';
    }
  },

  // Open form to create a sub-agent from a package template
  openSubAgentForm(vendor, template) {
    const formFields = template.form_fields || [];
    const scopedTools = template.scoped_tools || [];

    let html = '<div class="pkg-sub-agent-form">';
    html += '<div style="font-size:14px;font-weight:600;margin-bottom:4px;">Configure Dataset Agent</div>';
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">Create a focused sub-agent scoped to a specific BigQuery dataset.</div>';

    // Form fields from template
    for (const field of formFields) {
      html += '<label for="sa-field-' + esc(field.id) + '">' + esc(field.label) + (field.required ? ' *' : '') + '</label>';
      if (field.type === 'select') {
        html += '<select id="sa-field-' + esc(field.id) + '">';
        for (const opt of (field.options || [])) {
          html += '<option value="' + esc(opt) + '"' + (opt === field.default ? ' selected' : '') + '>' + esc(opt) + '</option>';
        }
        html += '</select>';
      } else {
        html += '<input type="text" id="sa-field-' + esc(field.id) + '" placeholder="' + esc(field.placeholder || '') + '" />';
      }
    }

    // Tool toggles
    html += '<label style="margin-top:16px;">Tools</label>';
    for (const tool of scopedTools) {
      const toolLabel = tool.display_name ? tool.display_name.replace(/\{display_name\}/g, '') : tool.action_filter;
      html += '<div class="tool-toggle-row">' +
        '<input type="checkbox" id="sa-tool-' + esc(tool.action_filter) + '"' + (tool.default_enabled ? ' checked' : '') + ' />' +
        '<span class="tool-toggle-label">' + esc(tool.action_filter) + '</span>' +
        '<span class="tool-toggle-desc">' + esc(toolLabel.trim()) + '</span>' +
      '</div>';
    }

    // Persona (pre-filled from template)
    html += '<label>Agent Persona</label>';
    html += '<textarea id="sa-persona" placeholder="Describe what this agent does...">' + esc(template.persona_template || '') + '</textarea>';

    // Provider/Model selects
    html += '<label>Model (optional)</label>';
    html += '<select id="sa-model"><option value="">Use default</option>';
    for (const prov of (this.state.providers || [])) {
      if (!prov.enabled) continue;
      for (const m of (prov.models || [])) {
        html += '<option value="' + esc(prov.id + '/' + m.model_id) + '">' + esc(prov.display_name + ' / ' + m.display_name) + '</option>';
      }
    }
    html += '</select>';

    // Actions
    html += '<div class="form-actions">' +
      '<button class="primary" id="sa-create">Create Agent</button>' +
      '<button id="sa-cancel">Cancel</button>' +
    '</div>';
    html += '<div id="sa-status" style="font-size:11px;color:var(--text-muted);margin-top:8px;"></div>';
    html += '</div>';

    this.openDynamicView('\u2699\ufe0f', 'Configure Dataset Agent', html);

    const self = this;

    // Cancel
    document.getElementById('sa-cancel').addEventListener('click', () => {
      self.closeDynamicView();
      self.renderPackageDetail(vendor);
    });

    // Create
    document.getElementById('sa-create').addEventListener('click', async () => {
      const statusEl = document.getElementById('sa-status');
      const createBtn = document.getElementById('sa-create');

      // Collect form values
      const values = {};
      for (const field of formFields) {
        const el = document.getElementById('sa-field-' + field.id);
        values[field.id] = el ? el.value.trim() : '';
        if (field.required && !values[field.id]) {
          statusEl.textContent = field.label + ' is required';
          statusEl.style.color = '#ef4444';
          return;
        }
      }

      // Collect enabled tools
      const enabledTools = [];
      for (const tool of scopedTools) {
        const cb = document.getElementById('sa-tool-' + tool.action_filter);
        if (cb && cb.checked) {
          enabledTools.push({
            tool_name: tool.tool_name,
            display_name: (tool.display_name || tool.action_filter).replace(/\{display_name\}/g, values.display_name || ''),
            locked_params: {
              dataset_id: values.dataset_id || '',
              project_id: values.project_id || '',
            },
            enabled: true,
          });
        }
      }

      // Build persona from template
      let persona = (document.getElementById('sa-persona')?.value || template.persona_template || '');
      for (const [key, val] of Object.entries(values)) {
        persona = persona.replace(new RegExp('\\{' + key + '\\}', 'g'), val);
      }

      // Build description
      let description = (template.description_template || '{display_name} sub-agent');
      for (const [key, val] of Object.entries(values)) {
        description = description.replace(new RegExp('\\{' + key + '\\}', 'g'), val);
      }

      const payload = {
        name: values.display_name || 'Dataset Agent',
        description,
        persona,
        scoped_tools: enabledTools,
        preferred_provider: null,
        preferred_model: null,
      };

      // Parse model selection
      const modelVal = document.getElementById('sa-model')?.value;
      if (modelVal) {
        const parts = modelVal.split('/');
        if (parts.length === 2) {
          payload.preferred_provider = parts[0];
          payload.preferred_model = parts[1];
        }
      }

      createBtn.disabled = true;
      createBtn.textContent = 'Creating...';
      statusEl.textContent = '';

      try {
        const resp = await fetch('/api/agents/pkg-' + encodeURIComponent(vendor) + '/sub-agents', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await resp.json();
        if (result.ok) {
          statusEl.textContent = '\u2713 Agent created: ' + result.name;
          statusEl.style.color = '#22c55e';
          await self.loadAgents();
          setTimeout(() => {
            self.closeDynamicView();
            self.renderPackageDetail(vendor);
          }, 800);
        } else {
          statusEl.textContent = 'Error: ' + (result.error || 'Unknown');
          statusEl.style.color = '#ef4444';
          createBtn.disabled = false;
          createBtn.textContent = 'Create Agent';
        }
      } catch (e) {
        statusEl.textContent = 'Error: ' + e.message;
        statusEl.style.color = '#ef4444';
        createBtn.disabled = false;
        createBtn.textContent = 'Create Agent';
      }
    });
  },

  // Add a resource tag to the list
  addResource(vendor, resourceType) {
    const input = document.getElementById('res-input-' + resourceType);
    const list = document.getElementById('res-list-' + resourceType);
    if (!input || !list || !input.value.trim()) return;

    const id = input.value.trim();
    // Check for duplicates
    if (list.querySelector('[data-id="' + id + '"]')) { input.value = ''; return; }

    const tag = document.createElement('span');
    tag.className = 'pkg-resource-tag';
    tag.dataset.id = id;
    tag.innerHTML = esc(id) + ' <button class="remove-btn" title="Remove">\u00d7</button>';
    tag.querySelector('.remove-btn').addEventListener('click', () => tag.remove());
    list.appendChild(tag);
    input.value = '';
    input.focus();
  },

  // Discover available resources from the backend
  async discoverResources(vendor, resourceType) {
    const list = document.getElementById('res-list-' + resourceType);
    if (!list) return;

    try {
      const resp = await fetch('/api/marketplace/packages/' + encodeURIComponent(vendor) + '/resources/discover', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resource_type: resourceType }),
      });
      const data = await resp.json();

      if (data.success && data.resources) {
        for (const res of data.resources) {
          const id = res.id || res.name || res;
          if (typeof id !== 'string' || !id) continue;
          if (list.querySelector('[data-id="' + id + '"]')) continue; // skip dupes

          const tag = document.createElement('span');
          tag.className = 'pkg-resource-tag';
          tag.dataset.id = id;
          tag.innerHTML = esc(id) + ' <button class="remove-btn" title="Remove">\u00d7</button>';
          tag.querySelector('.remove-btn').addEventListener('click', () => tag.remove());
          list.appendChild(tag);
        }
      } else if (data.message) {
        alert(data.message);
      } else if (data.error) {
        alert('Discovery failed: ' + data.error);
      }
    } catch (e) {
      alert('Discovery error: ' + e.message);
    }
  },
};

/* ═══════════════════════════════════════════════════════════════════
   Utility functions
   ═══════════════════════════════════════════════════════════════════ */
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Artifact storage (in-memory, per session)
const _artifacts = {};
let _artifactCounter = 0;

function formatContent(text) {
  if (!text) return '';

  // Extract <artifact> blocks BEFORE escaping (they contain raw HTML/code)
  const artifactPlaceholders = [];
  let processed = text.replace(/<artifact\s+type="([^"]+)"\s+title="([^"]+)">([\s\S]*?)<\/artifact>/g,
    (match, type, title, content) => {
      const id = 'artifact-' + (++_artifactCounter);
      _artifacts[id] = { id, type, title, content: content.trim() };
      const placeholder = `__ARTIFACT_${artifactPlaceholders.length}__`;
      const icon = type === 'html' ? '\u{1F310}' : type === 'code' ? '\u{1F4BB}' : type === 'svg' ? '\u{1F3A8}' : type === 'markdown' ? '\u{1F4C4}' : type === 'image' ? '\u{1F5BC}' : type === 'video' ? '\u{1F3AC}' : type === 'audio' ? '\u{1F50A}' : '\u{1F4E6}';
      artifactPlaceholders.push(
        `<div class="artifact-card" onclick="App.showArtifact('${id}')">` +
        `<span class="artifact-icon">${icon}</span>` +
        `<span class="artifact-title">${esc(title)}</span>` +
        `<span class="artifact-badge">${esc(type)}</span>` +
        `</div>`
      );
      return placeholder;
    }
  );

  // Extract code blocks before escaping (preserve raw content)
  const codeBlocks = [];
  processed = processed.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang || '', code: code.replace(/\n$/, '') });
    return `__CODEBLOCK_${idx}__`;
  });

  let h = esc(processed);

  // Restore code blocks with header + copy button
  for (let i = 0; i < codeBlocks.length; i++) {
    const { lang, code } = codeBlocks[i];
    const langLabel = lang || 'code';
    const copyId = 'copy-' + Math.random().toString(36).substr(2, 6);
    const codeHtml = `<pre><div class="code-header"><span>${esc(langLabel)}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('${copyId}').textContent);this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)">Copy</button></div><code id="${copyId}">${esc(code)}</code></pre>`;
    h = h.replace(`__CODEBLOCK_${i}__`, codeHtml);
  }

  // Inline code
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Bold and italic
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

  // Headings (### before ## before #)
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  h = h.replace(/^---$/gm, '<hr>');

  // Unordered lists (- or *)
  h = h.replace(/^(?:- |\* )(.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Ordered lists (1. 2. etc)
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> not inside <ul> into <ol>
  h = h.replace(/(<li>.*<\/li>(?:\n<li>.*<\/li>)*)/g, (match) => {
    if (match.includes('<ul>')) return match; // already wrapped
    return match;
  });

  // Links [text](url)
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Blockquotes
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Tables: | col | col |
  h = h.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, (_, header, sep, body) => {
    const thCells = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${thCells}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Paragraphs: convert double newlines to paragraph breaks
  h = h.replace(/\n\n+/g, '</p><p>');
  // Single newlines within paragraphs become <br>
  h = h.replace(/\n/g, '<br>');
  // Wrap in paragraph tags (but not if it starts with a block element)
  if (!/^<(h[1-3]|ul|ol|pre|table|hr|blockquote|div)/.test(h.trim())) {
    h = '<p>' + h + '</p>';
  }
  // Clean up <br> between list items (LLM puts blank lines between bullets)
  h = h.replace(/<\/li><br><li>/g, '</li><li>');
  h = h.replace(/<\/li>(<br>)+<li>/g, '</li><li>');
  // Collapse multiple consecutive <br> into one
  h = h.replace(/(<br>){2,}/g, '<br>');
  // Clean up empty paragraphs and bad nesting
  h = h.replace(/<p><\/p>/g, '');
  h = h.replace(/<\/p>\s*<p><\/p>\s*<p>/g, '</p><p>');
  h = h.replace(/<p>(<h[1-3]>)/g, '$1');
  h = h.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
  h = h.replace(/<p>(<ul>)/g, '$1');
  h = h.replace(/(<\/ul>)<\/p>/g, '$1');
  h = h.replace(/<p>(<ol>)/g, '$1');
  h = h.replace(/(<\/ol>)<\/p>/g, '$1');
  h = h.replace(/<p>(<pre>)/g, '$1');
  h = h.replace(/(<\/pre>)<\/p>/g, '$1');
  h = h.replace(/<p>(<table>)/g, '$1');
  h = h.replace(/(<\/table>)<\/p>/g, '$1');
  h = h.replace(/<p>(<hr>)/g, '$1');
  h = h.replace(/(<hr>)<\/p>/g, '$1');
  h = h.replace(/<p>(<blockquote>)/g, '$1');
  h = h.replace(/(<\/blockquote>)<\/p>/g, '$1');
  h = h.replace(/<p>(<div)/g, '$1');

  // Restore artifact cards
  for (let i = 0; i < artifactPlaceholders.length; i++) {
    h = h.replace(`__ARTIFACT_${i}__`, artifactPlaceholders[i]);
  }

  return h;
}

function fmtNum(n) {
  if (n === undefined || n === null) return '0';
  return n.toLocaleString();
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + (dateStr.includes('Z') ? '' : 'Z'));
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
