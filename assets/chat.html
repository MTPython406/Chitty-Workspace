  async executeBrowserCommand(cmd) {
    // Get iframe if browser view is already open (may be null for 'open' action)
    const iframe = document.getElementById('browser-iframe');
    try {
      switch (cmd.action) {
        case 'open': {
          const url = cmd.params.url;
          if (!url) return { id: cmd.id, success: false, data: null, error: 'Missing url parameter' };

          // Open browser view first (creates DOM elements)
          this.openBrowserView();
          this.toggleActionPanel(true);
          const iframe = document.getElementById('browser-iframe');
          const urlBar = document.getElementById('browser-url');
          const empty = document.getElementById('browser-empty');
          const screenshot = document.getElementById('browser-screenshot');
          // Show the page in the iframe — user can interact with it directly
          if (iframe) { iframe.src = url; iframe.style.display = 'block'; }
          if (screenshot) screenshot.style.display = 'none';
          if (empty) empty.style.display = 'none';
          if (urlBar) urlBar.value = url;
          const st = document.getElementById('browser-status-text');
          const sd = document.getElementById('browser-status-dot');
          if (st) st.textContent = 'Connected — ' + new URL(url).hostname;
          if (sd) sd.className = 'dot connected';

          // Wait for iframe load
          await new Promise((resolve) => {
            const timer = setTimeout(resolve, 8000);
            iframe.onload = () => { clearTimeout(timer); resolve(); };
          });

          this.activityLog('tool', `<span class="hl">Browser opened</span> <span class="dim">${esc(url)}</span>`);
          return { id: cmd.id, success: true, data: `Opened ${url} in the Action Panel browser. The user can see and interact with the page.`, error: null };
        }

        case 'screenshot': {
          try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            const text = doc.body.innerText.substring(0, 4000);
            const title = doc.title || '';
            return { id: cmd.id, success: true, data: JSON.stringify({ title, text, url: iframe.src }), error: null };
          } catch (e) {
            return { id: cmd.id, success: true, data: JSON.stringify({
              url: iframe.src,
              note: 'Cross-origin page — cannot read content. Only same-origin (localhost) pages support full interaction.'
            }), error: null };
          }
        }

        case 'click': {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (cmd.params.selector) {
            const el = doc.querySelector(cmd.params.selector);
            if (!el) return { id: cmd.id, success: false, data: null, error: `Element not found: ${cmd.params.selector}` };
            el.click();
            return { id: cmd.id, success: true, data: `Clicked ${cmd.params.selector}`, error: null };
          } else if (cmd.params.coordinate) {
            const { x, y } = cmd.params.coordinate;
            const el = doc.elementFromPoint(x, y);
            if (el) el.click();
            return { id: cmd.id, success: true, data: `Clicked at (${x}, ${y})`, error: null };
          }
          return { id: cmd.id, success: false, data: null, error: 'Provide selector or coordinate' };
        }

        case 'type': {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          const el = cmd.params.selector ? doc.querySelector(cmd.params.selector) : doc.activeElement;
          if (!el) return { id: cmd.id, success: false, data: null, error: `Element not found: ${cmd.params.selector || 'active element'}` };
          el.focus();
          el.value = cmd.params.text || '';
          el.dispatchEvent(new Event('input', { bubbles: true }));
          el.dispatchEvent(new Event('change', { bubbles: true }));
          return { id: cmd.id, success: true, data: `Typed into ${cmd.params.selector || 'active element'}`, error: null };
        }

        case 'read_text': {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          const el = cmd.params.selector ? doc.querySelector(cmd.params.selector) : doc.body;
          if (!el) return { id: cmd.id, success: false, data: null, error: `Element not found: ${cmd.params.selector}` };
          const text = el.innerText.substring(0, 8000);
          return { id: cmd.id, success: true, data: text, error: null };
        }

        case 'execute_js': {
          const win = iframe.contentWindow;
          const result = win.eval(cmd.params.script);
          const serialized = typeof result === 'object' ? JSON.stringify(result) : String(result);
          return { id: cmd.id, success: true, data: serialized.substring(0, 8000), error: null };
        }

        case 'close': {
          iframe.src = 'about:blank';
          iframe.style.display = 'none';
          empty.style.display = 'flex';
          urlBar.value = '';
          return { id: cmd.id, success: true, data: 'Browser closed', error: null };
        }

        default:
          return { id: cmd.id, success: false, data: null, error: `Unknown action: ${cmd.action}` };
      }
    } catch (e) {
      return { id: cmd.id, success: false, data: null, error: e.message };
    }
  },

  updateSubtitle() {

  renderProviderSelect() {
    const s = document.getElementById('provider-select');
    if (!s) return;
    s.innerHTML = this.state.providers.map(p =>
      `<option value="${p.provider_id}">${esc(p.display_name)}${p.has_key ? '' : ' (no key)'}</option>`
    ).join('');

  modelOptionsHTML() {
    // Build options grouped by provider from userModels + Ollama
    const allModels = [...(this.state.userModels || [])];

    // Add Ollama models if available
    if (this._ollamaModels && this._ollamaModels.length) {
      for (const m of this._ollamaModels) {
        const name = m.name || m.model;
        if (!allModels.find(x => (x.model_id || x.id) === name)) {
          allModels.push({ model_id: name, display_name: name, provider_id: 'ollama' });
        }
      }
    }

    if (!allModels.length) return '<option value="">No models — add in Settings</option>';

    // Group by provider
    const groups = {};
    const providerNames = { anthropic: 'Anthropic', openai: 'OpenAI', xai: 'xAI', google: 'Google AI', ollama: 'Ollama', huggingface: 'Local (GGUF)' };
    for (const m of allModels) {
      const pid = m.provider_id || 'other';
      if (!groups[pid]) groups[pid] = [];
      groups[pid].push(m);
    }

    // Render optgroups — cloud providers first, then local
    const order = ['anthropic', 'openai', 'xai', 'google', 'ollama', 'huggingface', 'other'];
    let html = '';
    for (const pid of order) {
      if (!groups[pid] || !groups[pid].length) continue;
      const label = providerNames[pid] || pid;
      html += `<optgroup label="${esc(label)}">`;
      for (const m of groups[pid]) {
        const val = m.model_id || m.id;
        const name = m.display_name || val;
        const sel = this.state.selectedModel === val ? 'selected' : '';
        html += `<option value="${val}" data-provider="${esc(pid)}" ${sel}>${esc(name)}</option>`;
      }
      html += '</optgroup>';
    }
    return html;
  },

  renderModelSelect() {
    // Update legacy select if present
    const s = document.getElementById('model-select');
    if (s) {
      s.innerHTML = this.state.models.length
        ? this.state.models.map(m => {
            const val = m.model_id || m.id;
            const name = m.display_name || val;
            return `<option value="${val}">${esc(name)}</option>`;
          }).join('')
        : '<option value="">No models — add in Settings</option>';
    }
    // Update all panel footer model selects
    document.querySelectorAll('.panel-model-select').forEach(sel => {
      sel.innerHTML = this.modelOptionsHTML();
      if (this.state.selectedModel) sel.value = this.state.selectedModel;
    });
  },

  renderWorkspace() {
    const rail = document.getElementById('carousel-rail');
    if (!rail) return;
    // Remove old panels but keep nav arrows
    rail.querySelectorAll('.panel').forEach(el => el.remove());
    // Add panel elements
    let html = '';
    this.state.panels.forEach(panel => {
      html += this.panelHTML(panel);
    });
    // Insert before the nav buttons
    const prevBtn = document.getElementById('carousel-prev');
    if (prevBtn) prevBtn.insertAdjacentHTML('beforebegin', html);
    else rail.insertAdjacentHTML('beforeend', html);

    // Bind events
    this.state.panels.forEach(panel => {
      this.bindPanelEvents(panel.id);
    });
    // Bind panel click for carousel focus
    this.state.panels.forEach((panel, i) => {
      const el = rail.querySelector(`.panel[data-panel-id="${panel.id}"]`);
      if (el) {
        el.addEventListener('mousedown', () => {
          if (i !== this.state.focusedIndex) {
            this.focusPanel(i);
          }
        });
      }
    });
    // Layout
    this.layoutCarousel();

  welcomeHTML(panel) {

      : 'How can I help you today?';

      <div class="welcome-name">${esc(name)}</div>
      <div class="welcome-sub">${esc(subtitle)}</div>`;

      html += `<div class="welcome-actions">
        <button class="welcome-action-btn" onclick="App.sendBuildAgentMessage()">
          <span style="font-size:16px;">\u{1F6E0}</span> Build an Agent
        </button>
        <button class="welcome-action-btn" onclick="App.openMarketplace()">
          <span style="font-size:16px;">\u{1F4E6}</span> Marketplace
        </button>
      </div>`;
    }
    html += '</div>';
    return html;

  messagesHTML(panel) {
    let html = '<div class="panel-messages">';
    for (const m of panel.messages) {
      if (m.role === 'system') {
        html += `<div class="message"><div class="message-error">${esc(m.content)}</div></div>`;
      } else {
        const sc = m.streaming ? ' streaming-cursor' : '';
        const msgClass = m.role === 'user' ? 'user-msg' : 'assistant-msg';
        // Render any attached media (images, video, audio) before text
        let mediaHtml = '';
        if (m.media && m.media.length > 0) {
          for (const media of m.media) {
            if (media.type === 'image') {
              const imgUrl = '/api/media/images/' + encodeURIComponent(media.filename);
              mediaHtml += `<div class="generated-media-container" style="margin-bottom:8px;">
                <img src="${imgUrl}" class="generated-image" alt="${esc(media.prompt || 'Generated image')}"
                  onclick="App.viewGeneratedImage('${esc(media.filename)}', '${imgUrl}', '${esc(media.prompt || '')}')"
                  style="max-height:240px;max-width:240px;cursor:pointer;" />
              </div>`;
            } else if (media.type === 'video') {
              const videoUrl = '/api/media/videos/' + encodeURIComponent(media.filename);
              mediaHtml += `<div class="generated-media-container" style="margin-bottom:8px;">
                <video class="generated-video" controls preload="metadata" style="max-width:100%;border-radius:8px;">
                  <source src="${videoUrl}" type="video/mp4" />
                </video>
              </div>`;
            } else if (media.type === 'audio') {
              const audioUrl = '/api/media/audio/' + encodeURIComponent(media.filename);
              mediaHtml += `<div class="generated-audio-container" style="margin-bottom:8px;">
                <audio controls preload="metadata" style="width:100%;">
                  <source src="${audioUrl}" type="audio/mpeg" />
                </audio>
              </div>`;
            }
          }
        }
        html += `<div class="message ${msgClass}">
          <div class="message-body">
            ${mediaHtml}
            <div class="message-content${sc}">${formatContent(m.content)}</div>
          </div>
        </div>`;
      }
    }
    html += '</div>';
    return html;
  },

  historyPopoverHTML(panelId) {
    const panel = this.getPanel(panelId);
    const agentId = panel ? panel.selectedAgent : null;
    // Filter conversations by the panel's selected agent
    const filtered = this.state.conversations.filter(c => {
      if (agentId) return c.agent_id === agentId;
      return !c.agent_id;
    });
    const convs = filtered.slice(0, 15);
    if (!convs.length) return '<div style="padding:12px;color:var(--text-muted);font-size:12px;">No history</div>';
    return convs.map(c =>
      `<div class="history-item" data-conv-id="${c.id}">
        <div class="history-item-title">${esc(c.title || 'Untitled')}</div>
        <div class="history-item-meta">${timeAgo(c.updated_at)}</div>
      </div>`
    ).join('');
  },

  renderPanel(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;
    const el = document.querySelector(`[data-panel-id="${panelId}"]`);
    if (!el) return;
    // Update header title
    el.querySelector('.panel-header-title').textContent = panel.name;
    // Update body
    const body = el.querySelector('.panel-body');
    body.innerHTML = panel.messages.length ? this.messagesHTML(panel) : this.welcomeHTML(panel);
    // Re-bind body events
    this.bindPanelBodyEvents(panelId);
    // Update send button
    const sb = el.querySelector('.panel-send-btn');
    if (sb) sb.disabled = panel.isStreaming;
    // Scroll to bottom
    const msgs = el.querySelector('.panel-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  },

  renderStreamingInPanel(panelId, text) {
    const el = document.querySelector(`[data-panel-id="${panelId}"] .panel-messages`);
    if (!el) return;
    const msgs = el.querySelectorAll('.message');
    if (!msgs.length) return;
    const last = msgs[msgs.length - 1];
    const contentEl = last.querySelector('.message-content');
    if (contentEl) {
      contentEl.innerHTML = formatContent(text);
      if (!contentEl.classList.contains('streaming-cursor')) contentEl.classList.add('streaming-cursor');
    }
    el.scrollTop = el.scrollHeight;
  },

  appendToolBlockInPanel(panelId, html) {
    const el = document.querySelector(`[data-panel-id="${panelId}"] .panel-messages`);
    if (!el) return;
    // Insert tool blocks before the last message (the streaming assistant message)
    const msgs = el.querySelectorAll('.message');
    const last = msgs.length ? msgs[msgs.length - 1] : null;
    const div = document.createElement('div');
    div.innerHTML = html;
    if (last) el.insertBefore(div.firstElementChild, last);
    else el.appendChild(div.firstElementChild);
    el.scrollTop = el.scrollHeight;
  },

  setSessionAutoApprove(checked, approvalId) {
    this.state.sessionAutoApprove = checked;
    if (checked) {
      // Auto-approve the current pending request too
      this.respondApproval(approvalId, true, null);
      this.activityLog('info', '<span style="color:#10b981">✓ Session auto-approve enabled</span> — all future actions will be approved automatically');
    }
  },

  async respondApproval(approvalId, approved, btnEl) {
    try {
      await fetch('/api/approval/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ approval_id: approvalId, approved }),
      });
      // Update the card UI
      const card = document.querySelector(`.approval-card[data-approval-id="${approvalId}"]`);
      if (card) {
        card.classList.add('resolved');
        const actions = card.querySelector('.approval-actions');
        if (actions) {
          actions.innerHTML = approved
            ? '<div class="approval-result approved">✓ Approved</div>'
            : '<div class="approval-result denied">✕ Denied</div>';
        }
        const badge = card.querySelector('.approval-badge');
        if (badge) {
          badge.textContent = approved ? 'Approved' : 'Denied';
          badge.style.background = approved ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)';
          badge.style.color = approved ? '#10b981' : '#ef4444';
        }
      }
      this.activityLog('info', approved
        ? `<span style="color:#10b981">✓ Action approved</span>`
        : `<span style="color:#ef4444">✕ Action denied</span>`);
    } catch (e) {
      console.error('Approval response failed:', e);
    }
  },

  /* ── Slash Commands ─────────────────────────────────────────────── */
  handleSlashCommand(panelId, text) {
    const panel = this.getPanel(panelId);
    if (!panel) return;
    const parts = text.split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1).join(' ');

    // Show the command as a user message
    panel.messages.push({ role: 'user', content: text });
    this.renderPanel(panelId);

    switch (cmd) {
      case '/schedule':
        this.showScheduleBuilder(panelId, args);
        break;
      case '/schedules':
        this.showSchedulesList(panelId);
        break;
      case '/skills':
        this.showSkillsList(panelId);
        break;
      case '/skill':
        if (args) {
          // Force-activate a skill by sending it as a chat message
          panel.messages.push({ role: 'assistant', content: `Loading skill: **${args}**...` });
          this.renderPanel(panelId);
          // Send as a regular message that triggers load_skill
          this.sendMessageInPanel(panelId, `Load and activate the skill "${args}" using the load_skill tool.`);
        } else {
          panel.messages.push({ role: 'system', content: 'Usage: /skill <skill-name>. Type /skills to see available skills.' });
          this.renderPanel(panelId);
        }
        break;
      case '/help':
        panel.messages.push({ role: 'assistant', content:
          '## Available Commands\n\n' +
          '| Command | Description |\n' +
          '|---------|-------------|\n' +
          '| `/skills` | List available skills |\n' +
          '| `/skill <name>` | Load a skill into the conversation |\n' +
          '| `/schedule` | Create a new scheduled task |\n' +
          '| `/schedules` | List all scheduled tasks |\n' +
          '| `/help` | Show this help message |\n\n' +
          'You can also just chat with Chitty — ask anything!'
        });
        this.renderPanel(panelId);
        break;
      default:
        panel.messages.push({ role: 'system', content: `Unknown command: ${cmd}. Type /help for available commands.` });
        this.renderPanel(panelId);
    }
  },

  async showSkillsList(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;
    try {
      const resp = await fetch('/api/skills');
      if (!resp.ok) throw new Error('Failed to load skills');
      const skills = await resp.json();
      if (!skills.length) {
        panel.messages.push({ role: 'assistant', content: 'No skills installed yet.\n\nAsk me to create a custom skill, or drop a SKILL.md folder into `~/.chitty-workspace/skills/`.' });
      } else {
        let msg = '## Available Skills\n\n';
        for (const s of skills) {
          const tools = s.allowed_tools?.length ? s.allowed_tools.join(', ') : 'all';
          msg += `**${s.name}** (${s.source})\n${s.description}\nTools: \`${tools}\`\n\n`;
        }
        msg += 'Use `/skill <name>` to load a skill, or just describe your task and I\'ll pick the right one.';
        panel.messages.push({ role: 'assistant', content: msg });
      }
    } catch (e) {
      panel.messages.push({ role: 'system', content: 'Failed to load skills: ' + e.message });
    }
    this.renderPanel(panelId);
  },

  async submitSchedule(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;

    const name = document.getElementById('sched-name')?.value?.trim();
    const prompt = document.getElementById('sched-prompt')?.value?.trim();
    const agentId = document.getElementById('sched-agent')?.value || null;
    const freqRadio = document.querySelector('input[name="sched-freq"]:checked');
    let cronExpr = freqRadio?.value || '0 9 * * *';
    if (cronExpr === 'custom') {
      cronExpr = document.getElementById('sched-custom-cron')?.value?.trim();
    }

    if (!prompt) {
      panel.messages.push({ role: 'system', content: 'Please enter a task description.' });
      this.renderPanel(panelId);
      return;
    }
    if (!name) {
      panel.messages.push({ role: 'system', content: 'Please enter a name for the schedule.' });
      this.renderPanel(panelId);
      return;
    }

    try {
      const resp = await fetch('/api/schedules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          agent_id: agentId,
          prompt,
          cron_expression: cronExpr,
          project_path: panel.projectPath,
        }),
      });
      const data = await resp.json();
      if (resp.ok) {
        // Remove the builder card
        document.querySelector('.schedule-builder')?.remove();
        panel.messages.push({ role: 'assistant', content:
          `✅ **Scheduled task created!**\n\n` +
          `**Name:** ${name}\n` +
          `**Schedule:** \`${cronExpr}\`\n` +
          `**Next run:** ${data.next_run_at ? new Date(data.next_run_at).toLocaleString() : 'Computing...'}\n\n` +
          `Type \`/schedules\` to view all scheduled tasks.`
        });
        this.renderPanel(panelId);
        this.activityLog('info', `<span class="hl">Scheduled task created:</span> ${esc(name)}`);
      } else {
        panel.messages.push({ role: 'system', content: `Error: ${data.error || 'Failed to create schedule'}` });
        this.renderPanel(panelId);
      }
    } catch (e) {
      panel.messages.push({ role: 'system', content: `Error creating schedule: ${e.message}` });
      this.renderPanel(panelId);
    }
  },

  async showSchedulesList(panelId) {
    const panel = this.getPanel(panelId);
    if (!panel) return;

    try {
      const resp = await fetch('/api/schedules');
      const schedules = await resp.json();

      if (!schedules.length) {
        panel.messages.push({ role: 'assistant', content:
          '📅 **No scheduled tasks yet.**\n\nType `/schedule` to create one.'
        });
        this.renderPanel(panelId);
        return;
      }

      let content = '📅 **Your Scheduled Tasks:**\n\n';
      for (const s of schedules) {
        const status = s.enabled ? '🟢 enabled' : '⏸ paused';
        const agentName = s.agent_id
          ? (this.state.agents.find(a => a.id === s.agent_id)?.name || s.agent_id)
          : 'Chitty';
        const lastRun = s.last_run_at ? new Date(s.last_run_at).toLocaleString() : 'Never';
        const nextRun = s.next_run_at ? new Date(s.next_run_at).toLocaleString() : '—';
        content += `**${s.name}** — ${agentName} (${status})\n`;
        content += `  Schedule: \`${s.cron_expression}\` | Last: ${lastRun} | Next: ${nextRun}\n\n`;
      }
      content += `Type \`/schedule\` to create a new task.`;

      panel.messages.push({ role: 'assistant', content });
      this.renderPanel(panelId);
    } catch (e) {
      panel.messages.push({ role: 'system', content: `Error loading schedules: ${e.message}` });
      this.renderPanel(panelId);
    }
  },

  bindPanelEvents(panelId) {
    const el = document.querySelector(`[data-panel-id="${panelId}"]`);
    if (!el) return;
    // Activate on click
    el.addEventListener('mousedown', () => this.setActivePanel(panelId));
    // New Session
    const newBtn = el.querySelector('.new-session-btn');
    if (newBtn) newBtn.addEventListener('click', e => { e.stopPropagation(); this.newSession(panelId); });
    // Create Agent
    const createAgentBtn = el.querySelector('.create-agent-btn');
    if (createAgentBtn) createAgentBtn.addEventListener('click', e => {
      e.stopPropagation();
      this.toggleActionPanel(true);
      this.switchActionTab('marketplace');
    });
    // Close
    const closeBtn = el.querySelector('.close-btn');
    if (closeBtn) closeBtn.addEventListener('click', e => { e.stopPropagation(); this.closePanel(panelId); });
    // Agent selector (now in input footer)
    const agentSel = el.querySelector('.panel-agent-select');
    if (agentSel) agentSel.addEventListener('change', async () => {
      const panel = this.getPanel(panelId);
      if (panel) {
        panel.selectedAgent = agentSel.value || null;
        // Load full agent to get preferred_provider/model and project_path
        if (agentSel.value) {
          try {
            const resp = await fetch(`/api/agents/${agentSel.value}`);
            if (resp.ok) {
              const agent = await resp.json();
              // Auto-fill project path
              if (agent.project_path) {
                panel.projectPath = agent.project_path;
                const projInput = el.querySelector('.panel-project-path');
                if (projInput) projInput.value = agent.project_path;
              }
              // Auto-switch to agent's preferred provider/model
              if (agent.preferred_provider) {
                this.state.selectedProvider = agent.preferred_provider;
                await this.loadModels(agent.preferred_provider);
                if (agent.preferred_model) {
                  this.state.selectedModel = agent.preferred_model;
                  this.renderModelSelect();
                }
              }
            }
          } catch (e) { console.error('Load agent details:', e); }
        }
        // Refresh history popover to show agent-specific conversations
        const pop = el.querySelector('.history-popover');
        if (pop) pop.innerHTML = this.historyPopoverHTML(panelId);
      }
    });
    // Model selector (in input footer) — also updates provider from data attribute
    const modelSel = el.querySelector('.panel-model-select');
    if (modelSel) modelSel.addEventListener('change', () => {
      this.state.selectedModel = modelSel.value;
      const opt = modelSel.selectedOptions[0];
      if (opt && opt.dataset.provider) {
        this.state.selectedProvider = opt.dataset.provider;
      }
      // Sync all panel model selects
      document.querySelectorAll('.panel-model-select').forEach(s => { if (s !== modelSel) s.value = modelSel.value; });
    });
    // Project path
    const projInput = el.querySelector('.panel-project-path');
    if (projInput) projInput.addEventListener('change', () => {
      const panel = this.getPanel(panelId);
      if (panel) {
        panel.projectPath = projInput.value.trim() || null;
        if (panel.projectPath) localStorage.setItem('chitty-default-project-path', panel.projectPath);
      }
    });
    // History
    const histBtn = el.querySelector('.history-btn');
    if (histBtn) histBtn.addEventListener('click', e => this.toggleHistory(panelId, e));
    // Textarea
    const ta = el.querySelector('.panel-textarea');
    if (ta) {
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMessageInPanel(panelId); }
      });
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 150) + 'px';
      });
    }
    // Send button
    const sb = el.querySelector('.panel-send-btn');
    if (sb) sb.addEventListener('click', () => this.sendMessageInPanel(panelId));
    // Body events (recent items, history items)
    this.bindPanelBodyEvents(panelId);
  },

  bindPanelBodyEvents(panelId) {
    const el = document.querySelector(`[data-panel-id="${panelId}"]`);
    if (!el) return;
    el.querySelectorAll('.recent-item').forEach(item => {
      item.addEventListener('click', () => this.loadConversationIntoPanel(panelId, item.dataset.convId));
    });
    el.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', () => {
        this.closeAllPopovers();
        this.loadConversationIntoPanel(panelId, item.dataset.convId);
      });
    });
  },

  renderProviderSettings() {
    const c = document.getElementById('provider-settings');
    c.innerHTML = this.state.providers.map(p => `
      <div class="provider-row">
        <span class="key-status ${p.has_key ? 'ok' : 'no'}">${p.has_key ? '\u2713' : '\u2022'}</span>
        <span class="provider-name">${esc(p.display_name)}</span>
        <input class="provider-key-input" type="password"
               placeholder="${p.has_key ? 'Key configured (enter new to replace)' : 'Enter API key...'}"
               data-provider="${p.provider_id}" />
        <button class="provider-save-btn" data-provider="${p.provider_id}">Save</button>
      </div>
    `).join('');
    c.querySelectorAll('.provider-save-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const pid = btn.dataset.provider;
        const input = c.querySelector(`input[data-provider="${pid}"]`);
        const key = input.value.trim();
        if (!key) return;
        try {
          const resp = await fetch(`/api/providers/${pid}/key`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: key }),
          });
          if (resp.ok) { input.value = ''; input.placeholder = 'Key saved!'; await this.loadProviders(); this.renderProviderSettings(); }
        } catch (e) { console.error('saveKey:', e); }
      });
    });
  },

  /* ── Providers Panel (Action Panel) ──────────────────────────── */
  async renderProvidersPanel() {
    const c = document.getElementById('providers-body');
    if (!c) return;
    await this.loadProviders();
    await this.loadAllUserModels();

    // Check Ollama status + models
    let ollamaStatus = { running: false, models: [] };
    try {
      const r = await fetch('/api/local/ollama/status');
      if (r.ok) {
        const s = await r.json();
        ollamaStatus.running = s.running;
        ollamaStatus.version = s.version;
      }
      if (ollamaStatus.running) {
        const mr = await fetch('/api/local/ollama/models');
        if (mr.ok) {
          const md = await mr.json();
          ollamaStatus.models = md.models || [];
        }
      }
    } catch (_) {}

    let html = '';

    /* ─── Cloud Providers ─── */
    html += '<div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Cloud Providers</div>';

    for (const p of this.state.providers.filter(p => p.provider_id !== 'ollama' && p.provider_id !== 'huggingface')) {
      const modelCount = this.state.userModels.filter(m => m.provider_id === p.provider_id).length;
      html += `<div class="provider-card" data-pid="${esc(p.provider_id)}">
        <div class="provider-card-header">
          <div class="provider-card-info">
            <span class="provider-card-status ${p.has_key ? 'ok' : ''}">${p.has_key ? '✓' : '○'}</span>
            <span class="provider-card-name">${esc(p.display_name)}</span>
          </div>
          <div class="provider-card-meta">${modelCount} model${modelCount !== 1 ? 's' : ''}</div>
        </div>
        <div class="provider-card-actions">
          <button class="provider-card-btn key-btn" data-pid="${esc(p.provider_id)}">
            ${p.has_key ? '🔑 Update Key' : '🔑 Add Key'}
          </button>
          <button class="provider-card-btn models-btn" data-pid="${esc(p.provider_id)}" ${!p.has_key ? 'disabled' : ''}>
            📋 Models
          </button>
        </div>
        <div class="provider-card-key-form" id="key-form-${esc(p.provider_id)}" style="display:none;">
          <input type="password" class="provider-card-key-input" placeholder="${p.has_key ? 'Enter new key to replace...' : 'Enter API key...'}" data-pid="${esc(p.provider_id)}" />
          <div style="display:flex;gap:4px;">
            <button class="provider-card-btn save-key-btn" data-pid="${esc(p.provider_id)}">Save</button>
            <button class="provider-card-btn cancel-key-btn" data-pid="${esc(p.provider_id)}">Cancel</button>
          </div>
        </div>
        <div class="provider-card-models" id="models-panel-${esc(p.provider_id)}" style="display:none;"></div>
      </div>`;
    }

    /* ─── Local Models ─── */
    html += '<div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin:20px 0 10px;">Local Models</div>';

    /* Ollama */
    const ollamaModels = ollamaStatus.models || [];
    html += `<div class="provider-card local-provider">
      <div class="provider-card-header">
        <div class="provider-card-info">
          <span class="provider-card-status ${ollamaStatus.running ? 'ok' : ''}">${ollamaStatus.running ? '✓' : '○'}</span>
          <span class="provider-card-name">Ollama</span>
        </div>
        <div class="provider-card-meta">${ollamaStatus.running ? ollamaModels.length + ' model' + (ollamaModels.length !== 1 ? 's' : '') + ' loaded' : 'Not running'}</div>
      </div>`;

    if (ollamaStatus.running) {
      html += '<div class="local-models-list">';
      if (ollamaModels.length === 0) {
        html += '<div style="font-size:11px;color:var(--text-muted);padding:8px 0;">No models installed. Run <code style="background:var(--bg-card);padding:2px 4px;border-radius:3px;">ollama pull llama3</code> to get started.</div>';
      }
      for (const m of ollamaModels) {
        const size = m.size ? (m.size / (1024*1024*1024)).toFixed(1) + ' GB' : '';
        html += `<div class="local-model-item">
          <div class="local-model-info">
            <div class="local-model-name">${esc(m.name || m.model)}</div>
            <div class="local-model-meta">${size}${m.details?.quantization_level ? ' • ' + esc(m.details.quantization_level) : ''}${m.details?.parameter_size ? ' • ' + esc(m.details.parameter_size) : ''}</div>
          </div>
        </div>`;
      }
      html += '</div>';
      html += `<div class="provider-card-actions" style="margin-top:8px;">
        <button class="provider-card-btn" id="ollama-refresh-btn">↻ Refresh</button>
        <button class="provider-card-btn" id="ollama-pull-btn">+ Pull Model</button>
      </div>`;
      html += `<div id="ollama-pull-form" style="display:none;margin-top:8px;">
        <div style="display:flex;gap:4px;">
          <input type="text" id="ollama-pull-input" class="provider-card-key-input" placeholder="Model name (e.g. llama3, mistral, phi3)" />
          <button class="provider-card-btn" id="ollama-pull-go">Pull</button>
        </div>
        <div id="ollama-pull-status" style="font-size:11px;color:var(--text-muted);margin-top:4px;"></div>
      </div>`;
    } else {
      html += `<div style="font-size:11px;color:var(--text-muted);padding:8px 0;">
        Ollama is not running. <a href="#" style="color:var(--accent);" onclick="event.preventDefault();fetch('/api/providers/ollama/start',{method:'POST'}).then(()=>setTimeout(()=>app.renderProvidersPanel(),2000));">Start Ollama</a>
        or install from <a href="https://ollama.ai" target="_blank" style="color:var(--accent);">ollama.ai</a>
      </div>`;
    }
    html += '</div>';

    /* HuggingFace / GGUF */
    html += `<div class="provider-card local-provider">
      <div class="provider-card-header">
        <div class="provider-card-info">
          <span class="provider-card-status" id="sidecar-status-dot">○</span>
          <span class="provider-card-name">Local Models (GGUF)</span>
        </div>
        <div class="provider-card-meta" id="sidecar-status-text">Checking...</div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);padding:8px 0;line-height:1.6;">
        Load GGUF model files locally via the Python inference sidecar.<br>
        Models scanned from <code style="background:var(--bg-card);padding:2px 4px;border-radius:3px;">C:\\LLM Models</code>
        and <code style="background:var(--bg-card);padding:2px 4px;border-radius:3px;">~/.chitty-workspace/models/</code>
      </div>
      <div class="provider-card-actions" style="flex-wrap:wrap;gap:6px;">
        <button class="provider-card-btn" id="gguf-scan-btn">🔍 Scan Models</button>
        <button class="provider-card-btn" id="gguf-sidecar-btn">⚡ Start Sidecar</button>
        <button class="provider-card-btn" id="gguf-stop-btn" style="display:none;">⏹ Stop Sidecar</button>
        <button class="provider-card-btn" id="gguf-browse-btn">📂 Browse File</button>
      </div>
      <div id="gguf-models-list" style="margin-top:8px;"></div>
    </div>`;

    /* ─── Runtime Monitoring ─── */
    html += '<div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin:20px 0 10px;">Monitoring</div>';
    html += `<div class="provider-card">
      <div class="monitor-grid">
        <div class="monitor-item">
          <div class="monitor-label">GPU</div>
          <div class="monitor-value" id="monitor-gpu">—</div>
        </div>
        <div class="monitor-item">
          <div class="monitor-label">VRAM</div>
          <div class="monitor-value" id="monitor-vram">—</div>
        </div>
        <div class="monitor-item">
          <div class="monitor-label">RAM</div>
          <div class="monitor-value" id="monitor-ram">—</div>
        </div>
        <div class="monitor-item">
          <div class="monitor-label">Active Model</div>
          <div class="monitor-value" id="monitor-model">—</div>
        </div>
      </div>
      <button class="provider-card-btn" id="monitor-refresh-btn" style="margin-top:8px;">↻ Refresh Stats</button>
    </div>`;

    c.innerHTML = html;

    /* ─── Bind Events ─── */
    // API Key toggle
    c.querySelectorAll('.key-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = document.getElementById('key-form-' + btn.dataset.pid);
        if (form) form.style.display = form.style.display === 'none' ? 'flex' : 'none';
      });
    });
    // Cancel key
    c.querySelectorAll('.cancel-key-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = document.getElementById('key-form-' + btn.dataset.pid);
        if (form) form.style.display = 'none';
      });
    });
    // Save key
    c.querySelectorAll('.save-key-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const input = c.querySelector(`.provider-card-key-input[data-pid="${btn.dataset.pid}"]`);
        const key = input?.value.trim();
        if (!key) return;
        try {
          const resp = await fetch(`/api/providers/${btn.dataset.pid}/key`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: key }),
          });
          if (resp.ok) {
            await this.loadProviders();
            this.renderProvidersPanel();
          }
        } catch (e) { console.error('saveKey:', e); }
      });
    });
    // Models toggle
    c.querySelectorAll('.models-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const panel = document.getElementById('models-panel-' + btn.dataset.pid);
        if (!panel) return;
        if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        panel.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:8px;">Loading...</div>';
        await this.renderProviderModelsInline(btn.dataset.pid, panel);
      });
    });
    // Ollama refresh
    document.getElementById('ollama-refresh-btn')?.addEventListener('click', () => this.renderProvidersPanel());
    // Ollama pull
    document.getElementById('ollama-pull-btn')?.addEventListener('click', () => {
      const form = document.getElementById('ollama-pull-form');
      if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('ollama-pull-go')?.addEventListener('click', async () => {
      const input = document.getElementById('ollama-pull-input');
      const status = document.getElementById('ollama-pull-status');
      const name = input?.value.trim();
      if (!name) return;
      status.textContent = 'Pulling ' + name + '...';
      try {
        const r = await fetch('/api/providers/ollama/pull', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: name }),
        });
        const data = await r.json();
        status.textContent = data.error ? 'Error: ' + data.error : 'Pull started — refresh to check progress.';
        if (!data.error) setTimeout(() => this.renderProvidersPanel(), 3000);
      } catch (e) { status.textContent = 'Error: ' + e.message; }
    });
    // GGUF scan
    /* ─── Sidecar status check ─── */
    (async () => {
      try {
        const r = await fetch('/api/local/sidecar/status');
        const s = await r.json();
        const dot = document.getElementById('sidecar-status-dot');
        const txt = document.getElementById('sidecar-status-text');
        const startBtn = document.getElementById('gguf-sidecar-btn');
        const stopBtn = document.getElementById('gguf-stop-btn');
        if (s.running) {
          dot.textContent = '●'; dot.style.color = 'var(--success)';
          txt.textContent = s.loaded_model ? `Running · ${s.loaded_model}` : `Running · ${s.models_registered || 0} models`;
          startBtn.style.display = 'none';
          stopBtn.style.display = '';
        } else {
          dot.textContent = '○'; dot.style.color = 'var(--text-muted)';
          txt.textContent = s.python_found ? 'Not running' : 'Python not found';
          startBtn.style.display = '';
          stopBtn.style.display = 'none';
        }
      } catch (_) {}
    })();

    /* ─── Scan models (works without sidecar — direct filesystem scan) ─── */
    document.getElementById('gguf-scan-btn')?.addEventListener('click', async () => {
      const list = document.getElementById('gguf-models-list');
      list.innerHTML = '<div style="font-size:11px;color:var(--text-muted);">Scanning model directories...</div>';
      try {
        // Try sidecar first, fall back to direct scan
        let models = [];
        const sidecarR = await fetch('/api/local/sidecar/status');
        const sidecarS = await sidecarR.json();
        if (sidecarS.running) {
          const r = await fetch('/api/local/sidecar/models/scan', { method: 'POST' });
          const data = await r.json();
          models = data.models || [];
        } else {
          const r = await fetch('/api/local/gguf/scan');
          const data = await r.json();
          models = data.models || [];
        }
        if (!models.length) {
          list.innerHTML = '<div style="font-size:11px;color:var(--text-muted);">No GGUF files found.</div>';
        } else {
          list.innerHTML = models.map(m => {
            const safeName = (m.name || '').replaceAll('&','&amp;').replaceAll("'","&#39;").replaceAll('"','&quot;');
            const sizeGb = m.size_gb ? m.size_gb.toFixed(1) : (m.size_bytes ? (m.size_bytes / (1024*1024*1024)).toFixed(1) : '?');
            const quant = m.quantization ? ` · ${m.quantization}` : '';
            const loaded = m.loaded ? ' · <span style="color:var(--success);font-weight:600;">LOADED</span>' : '';
            return `<div class="local-model-item" style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--bg-card);border-radius:6px;margin-bottom:4px;">
              <div>
                <div style="font-size:12px;font-weight:500;">${safeName}</div>
                <div style="font-size:10px;color:var(--text-muted);">${sizeGb} GB${quant}${loaded}</div>
              </div>
              <div style="display:flex;gap:4px;">
                ${!m.loaded ? `<button class="provider-card-btn" style="font-size:10px;padding:2px 8px;" onclick="App.loadGgufModel('${safeName}')">Load</button>` : `<button class="provider-card-btn" style="font-size:10px;padding:2px 8px;" onclick="App.unloadGgufModel()">Unload</button>`}
              </div>
            </div>`;
          }).join('');
        }
      } catch (e) {
        list.innerHTML = `<div style="font-size:11px;color:var(--danger);">Scan failed: ${e.message}</div>`;
      }
    });

    /* ─── Start sidecar ─── */
    document.getElementById('gguf-sidecar-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('gguf-sidecar-btn');
      btn.textContent = '⏳ Starting...';
      btn.disabled = true;
      try {
        const r = await fetch('/api/local/sidecar/start', { method: 'POST' });
        const data = await r.json();
        if (data.success) {
          // Re-render to update status
          setTimeout(() => app.renderProvidersPanel(), 1000);
        } else {
          alert('Failed to start sidecar: ' + (data.error || 'Unknown error'));
          btn.textContent = '⚡ Start Sidecar';
          btn.disabled = false;
        }
      } catch (e) {
        alert('Error starting sidecar: ' + e.message);
        btn.textContent = '⚡ Start Sidecar';
        btn.disabled = false;
      }
    });

    /* ─── Stop sidecar ─── */
    document.getElementById('gguf-stop-btn')?.addEventListener('click', async () => {
      await fetch('/api/local/sidecar/stop', { method: 'POST' });
      setTimeout(() => app.renderProvidersPanel(), 1000);
    });

    /* ─── Browse for GGUF file ─── */
    document.getElementById('gguf-browse-btn')?.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.gguf';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // WebView2 gives us the real path via file.name for local files
        // For security, we register by name and let the user confirm the path
        const path = prompt('Enter the full path to the GGUF file:', file.name);
        if (!path) return;
        try {
          const r = await fetch('/api/local/sidecar/models/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path }),
          });
          const data = await r.json();
          if (data.success) {
            document.getElementById('gguf-scan-btn')?.click(); // Refresh list
          } else {
            alert('Failed to register: ' + (data.error || data.detail || 'Unknown error'));
          }
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };
      input.click();
    });

    /* ─── Monitor refresh ─── */
    document.getElementById('monitor-refresh-btn')?.addEventListener('click', async () => {
      try {
        const r = await fetch('/api/local/gpu');
        if (r.ok) {
          const data = await r.json();
          document.getElementById('monitor-gpu').textContent = data.gpu_name || 'No GPU';
          document.getElementById('monitor-vram').textContent = data.vram_used_mb && data.vram_total_mb
            ? `${(data.vram_used_mb/1024).toFixed(1)}/${(data.vram_total_mb/1024).toFixed(1)} GB`
            : '—';
          document.getElementById('monitor-ram').textContent = '—';
          // Check active model — sidecar first, then Ollama
          let activeModel = 'None';
          try {
            const sr = await fetch('/api/local/sidecar/status');
            const ss = await sr.json();
            if (ss.loaded_model) activeModel = ss.loaded_model;
          } catch (_) {}
          if (activeModel === 'None') {
            try {
              const or = await fetch('/api/local/ollama/running');
              const os = await or.json();
              if (os.models && os.models.length) {
                activeModel = os.models.map(m => m.name || m.model).join(', ');
              }
            } catch (_) {}
          }
          document.getElementById('monitor-model').textContent = activeModel;
        }
      } catch (_) {}
    });
    // Auto-refresh on panel load
    document.getElementById('monitor-refresh-btn')?.click();
  },

  /* ── GGUF model load/unload helpers ──── */
  async loadGgufModel(name) {
    const list = document.getElementById('gguf-models-list');
    if (list) list.innerHTML = `<div style="font-size:11px;color:var(--text-muted);">Loading ${name}... (this may take a minute)</div>`;
    try {
      const r = await fetch('/api/local/sidecar/models/load', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: name }),
      });
      const data = await r.json();
      if (data.success) {
        // Refresh the model list
        document.getElementById('gguf-scan-btn')?.click();
        app.renderProvidersPanel();
      } else {
        alert('Failed to load model: ' + (data.error || 'Unknown error'));
        document.getElementById('gguf-scan-btn')?.click();
      }
    } catch (e) {
      alert('Error loading model: ' + e.message);
    }
  },

  async unloadGgufModel() {
    try {
      await fetch('/api/local/sidecar/models/unload', { method: 'POST' });
      document.getElementById('gguf-scan-btn')?.click();
      app.renderProvidersPanel();
    } catch (e) {
      alert('Error unloading model: ' + e.message);
    }
  },

  /* ── Inline models for a provider (inside Providers panel) ──── */
  async renderProviderModelsInline(pid, container) {
    await this.loadAllUserModels();
    const myModels = this.state.userModels.filter(m => m.provider_id === pid);

    let html = '';
    if (myModels.length) {
      html += '<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;font-weight:600;">YOUR MODELS</div>';
      for (const m of myModels) {
        html += `<div class="local-model-item">
          <div class="local-model-info">
            <div class="local-model-name">${esc(m.display_name)}</div>
            <div class="local-model-meta">${esc(m.model_id)}${m.context_window ? ' • ' + (m.context_window/1000) + 'k ctx' : ''}</div>
          </div>
          <div style="display:flex;gap:4px;">
            <button class="provider-card-btn inline-default-btn ${m.is_default ? 'is-default' : ''}" data-mid="${m.id}">${m.is_default ? '★ Default' : 'Set Default'}</button>
            <button class="provider-card-btn inline-remove-btn" data-mid="${m.id}" style="color:var(--danger);">×</button>
          </div>
        </div>`;
      }
    }
    html += `<button class="provider-card-btn" id="inline-discover-${esc(pid)}" style="margin-top:8px;">+ Discover Models</button>`;
    html += `<div id="inline-discover-results-${esc(pid)}"></div>`;

    container.innerHTML = html;

    // Bind default/remove
    container.querySelectorAll('.inline-default-btn:not(.is-default)').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch(`/api/models/${btn.dataset.mid}/default`, { method: 'POST' });
        await this.renderProviderModelsInline(pid, container);
        await this.loadModels(this.state.selectedProvider);
        this.renderModelSelect();
      });
    });
    container.querySelectorAll('.inline-remove-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch(`/api/models/${btn.dataset.mid}`, { method: 'DELETE' });
        await this.renderProviderModelsInline(pid, container);
        await this.loadModels(this.state.selectedProvider);
        this.renderModelSelect();
      });
    });
    // Discover
    document.getElementById('inline-discover-' + pid)?.addEventListener('click', async () => {
      const results = document.getElementById('inline-discover-results-' + pid);
      results.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:4px;">Fetching...</div>';
      try {
        const resp = await fetch(`/api/providers/${pid}/discover`);
        const data = await resp.json();
        const models = data.models || [];
        const addedIds = new Set(this.state.userModels.filter(m => m.provider_id === pid).map(m => m.model_id));
        results.innerHTML = models.map(m => {
          const mid = m.id || m.model_id;
          const name = m.display_name || mid;
          const isAdded = addedIds.has(mid);
          return `<div class="local-model-item">
            <div class="local-model-info">
              <div class="local-model-name">${esc(name)}</div>
              <div class="local-model-meta">${esc(mid)}</div>
            </div>
            <button class="provider-card-btn inline-add-btn ${isAdded ? 'is-default' : ''}"
              data-mid="${esc(mid)}" data-name="${esc(name)}" data-pid="${pid}"
              data-ctx="${m.context_window || ''}"
              data-tools="${m.capabilities?.tool_calling || m.supports_tools || false}"
              data-streaming="${m.capabilities?.streaming || m.supports_streaming || true}"
              data-vision="${m.capabilities?.vision || m.supports_vision || false}"
              ${isAdded ? 'disabled' : ''}>${isAdded ? 'Added' : '+ Add'}</button>
          </div>`;
        }).join('');
        results.querySelectorAll('.inline-add-btn:not(.is-default)').forEach(abtn => {
          abtn.addEventListener('click', async () => {
            const body = {
              provider_id: abtn.dataset.pid, model_id: abtn.dataset.mid,
              display_name: abtn.dataset.name,
              context_window: abtn.dataset.ctx ? parseInt(abtn.dataset.ctx) : null,
              supports_tools: abtn.dataset.tools === 'true',
              supports_streaming: abtn.dataset.streaming !== 'false',
              supports_vision: abtn.dataset.vision === 'true',
            };
            const r = await fetch('/api/models', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (r.ok) {
              abtn.classList.add('is-default'); abtn.textContent = 'Added'; abtn.disabled = true;
              await this.loadAllUserModels();
              await this.renderProviderModelsInline(pid, container);
            }
          });
        });
      } catch (e) {
        results.innerHTML = `<div style="font-size:11px;color:var(--danger);">Error: ${esc(e.message)}</div>`;
      }
    });
  },

  /* ── Integrations (OAuth) ────────────────────────────────────── */
  async renderIntegrations() {
    const c = document.getElementById('integrations-settings');
    if (!c) return;

    try {
      const resp = await fetch('/api/oauth/status');
      const data = await resp.json();
      const integrations = data.integrations || [];

      let html = '<div class="model-section">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
      html += '<div class="model-section-title" style="margin-bottom:0;">Connected Services</div>';
      html += `<button class="discover-btn" style="font-size:11px;padding:5px 14px;display:flex;align-items:center;gap:5px;"
        onclick="document.querySelector('[data-tab=marketplace]').click();">
        <span style="font-size:13px;">🛒</span> Browse Marketplace</button>`;
      html += '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Connect your accounts to give agents real API access. Tokens are stored securely on your machine — never sent to any server.</div>';

      for (const intg of integrations) {
        const statusColor = intg.connected ? '#10b981' : 'var(--text-muted)';
        const statusText = intg.connected ? 'Connected' : 'Not Connected';
        const statusIcon = intg.connected ? '✓' : '○';

        html += `<div class="user-model-item" style="margin-bottom:8px;">
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:13px;font-weight:600;color:var(--text-primary);">${esc(intg.display_name)}</span>
              <span style="font-size:11px;color:${statusColor};font-weight:500;">${statusIcon} ${statusText}</span>
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${esc(intg.description)}</div>
          </div>
          <div style="display:flex;gap:6px;">`;

        if (intg.connected) {
          html += `<button class="discover-btn" style="background:var(--bg-card);color:var(--danger);border:1px solid var(--border);font-size:11px;padding:4px 12px;"
            onclick="App.disconnectIntegration('${esc(intg.provider)}')">Disconnect</button>`;
        } else {
          html += `<button class="discover-btn" style="font-size:11px;padding:4px 12px;"
            onclick="App.connectIntegration('${esc(intg.provider)}')">Connect ${esc(intg.display_name)}</button>`;
        }

        html += '</div></div>';
      }

      // Marketplace hint for additional integrations
      html += `<div style="margin-top:16px;padding:12px;background:var(--bg-card);border:1px dashed var(--border);border-radius:8px;text-align:center;">
        <div style="font-size:12px;color:var(--text-muted);">Need Microsoft, GitHub, Slack, or other integrations?</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Install them from the <a href="#" style="color:var(--accent);text-decoration:none;font-weight:500;" onclick="event.preventDefault();document.querySelector('[data-tab=marketplace]').click();">Marketplace</a> — each comes with a setup wizard for your own OAuth credentials.</div>
      </div>`;

      html += '</div>';
      c.innerHTML = html;
    } catch (e) {
      c.innerHTML = '<div style="color:var(--danger);padding:12px;">Failed to load integration status.</div>';
      console.error('renderIntegrations:', e);
    }
  },

  async connectIntegration(provider) {
    // Open the OAuth flow in a new browser tab
    window.open(`/oauth/start/${provider}`, '_blank');
    // Poll for connection status
    const check = setInterval(async () => {
      try {
        const resp = await fetch(`/api/oauth/status/${provider}`);
        const data = await resp.json();
        if (data.connected) {
          clearInterval(check);
          this.renderIntegrations();
        }
      } catch (_) {}
    }, 2000);
    // Stop polling after 2 minutes
    setTimeout(() => clearInterval(check), 120000);
  },

  async disconnectIntegration(provider) {
    if (!confirm(`Disconnect ${provider}? This will remove your saved credentials.`)) return;
    try {
      await fetch(`/api/oauth/disconnect/${provider}`, { method: 'POST' });
      this.renderIntegrations();
    } catch (e) {
      console.error('disconnect:', e);
    }
  },

  /* ── Model management ────────────────────────────────────────── */
  async renderModelsSettings() {
    const c = document.getElementById('models-settings');
    await this.loadAllUserModels();

    // Group user models by provider
    const grouped = {};
    for (const m of this.state.userModels) {
      if (!grouped[m.provider_id]) grouped[m.provider_id] = [];
      grouped[m.provider_id].push(m);
    }

    const providersWithKeys = this.state.providers.filter(p => p.has_key);

    let html = '';

    // Provider model discovery section
    html += '<div class="model-section">';
    html += '<div class="model-section-title">Add Models from Provider</div>';
    html += '<div style="display:flex;gap:8px;margin-bottom:12px;">';
    html += '<select id="discover-provider" class="topbar-select" style="min-width:140px;">';
    html += providersWithKeys.map(p => `<option value="${p.provider_id}">${esc(p.display_name)}</option>`).join('');
    if (!providersWithKeys.length) html += '<option value="">No providers configured</option>';
    html += '</select>';
    html += '<button class="discover-btn" id="discover-btn"' + (providersWithKeys.length ? '' : ' disabled') + '>Fetch Available Models</button>';
    html += '</div>';
    html += '<div id="discover-results"></div>';
    html += '</div>';

    // Current user models
    html += '<div class="model-section">';
    html += '<div class="model-section-title">Your Models</div>';
    if (this.state.userModels.length === 0) {
      html += '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">No models added yet. Use "Fetch Available Models" above to discover and add models.</div>';
    }
    for (const [pid, models] of Object.entries(grouped)) {
      const prov = this.state.providers.find(p => p.provider_id === pid);
      const provName = prov ? prov.display_name : pid;
      html += `<div style="font-size:11px;color:var(--text-muted);margin:10px 0 6px;font-weight:600;">${esc(provName)}</div>`;
      for (const m of models) {
        html += `<div class="user-model-item">
          <div class="model-info">
            <div class="model-name">${esc(m.display_name)}</div>
            <div class="model-meta">${esc(m.model_id)}${m.context_window ? ' \u2022 ' + (m.context_window / 1000) + 'k ctx' : ''}</div>
          </div>
          <button class="user-model-default ${m.is_default ? 'is-default' : ''}" data-model-id="${m.id}">${m.is_default ? 'Default' : 'Set Default'}</button>
          <button class="user-model-remove" data-model-id="${m.id}">Remove</button>
        </div>`;
      }
    }
    html += '</div>';

    c.innerHTML = html;

    // Bind discover button
    const discoverBtn = document.getElementById('discover-btn');
    if (discoverBtn) {
      discoverBtn.addEventListener('click', () => this.discoverModels());
    }

    // Bind set-default and remove buttons
    c.querySelectorAll('.user-model-default:not(.is-default)').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch(`/api/models/${btn.dataset.modelId}/default`, { method: 'POST' });
        await this.renderModelsSettings();
        if (this.state.selectedProvider) await this.loadModels(this.state.selectedProvider);
      });
    });
    c.querySelectorAll('.user-model-remove').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch(`/api/models/${btn.dataset.modelId}`, { method: 'DELETE' });
        await this.renderModelsSettings();
        if (this.state.selectedProvider) await this.loadModels(this.state.selectedProvider);
      });
    });
  },

  async discoverModels() {
    const sel = document.getElementById('discover-provider');
    if (!sel) return;
    const pid = sel.value;
    if (!pid) return;

    const btn = document.getElementById('discover-btn');
    const results = document.getElementById('discover-results');
    if (btn) { btn.disabled = true; btn.textContent = 'Fetching...'; }
    results.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">Loading models from provider...</div>';

    try {
      const resp = await fetch(`/api/providers/${pid}/discover`);
      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      const models = data.models || [];
      this.state.discoveredModels = models;

      // Check which are already added
      const addedIds = new Set(this.state.userModels.filter(m => m.provider_id === pid).map(m => m.model_id));

      if (!models.length) {
        results.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">No models found from this provider.</div>';
      } else {
        results.innerHTML = '<div class="discover-list">' + models.map(m => {
          const mid = m.id || m.model_id;
          const name = m.display_name || mid;
          const isAdded = addedIds.has(mid);
          const caps = [];
          if (m.capabilities?.chat || m.supports_tools !== undefined) caps.push('chat');
          if (m.capabilities?.vision || m.supports_vision) caps.push('vision');
          if (m.capabilities?.tool_calling || m.supports_tools) caps.push('tools');
          if (m.capabilities?.image_generation) caps.push('img-gen');
          if (m.capabilities?.embeddings) caps.push('embed');
          const meta = caps.length ? caps.join(', ') : '';
          return `<div class="discover-item">
            <div class="discover-item-info">
              <div class="discover-item-name">${esc(name)}</div>
              <div class="discover-item-meta">${esc(mid)}${meta ? ' \u2022 ' + meta : ''}</div>
            </div>
            <button class="discover-item-add ${isAdded ? 'added' : ''}"
              data-mid="${esc(mid)}" data-name="${esc(name)}" data-pid="${pid}"
              data-ctx="${m.context_window || ''}"
              data-tools="${m.capabilities?.tool_calling || m.supports_tools || false}"
              data-streaming="${m.capabilities?.streaming || m.supports_streaming || true}"
              data-vision="${m.capabilities?.vision || m.supports_vision || false}"
              ${isAdded ? 'disabled' : ''}>
              ${isAdded ? 'Added' : 'Add'}
            </button>
          </div>`;
        }).join('') + '</div>';

        // Bind add buttons
        results.querySelectorAll('.discover-item-add:not(.added)').forEach(abtn => {
          abtn.addEventListener('click', async () => {
            const body = {
              provider_id: abtn.dataset.pid,
              model_id: abtn.dataset.mid,
              display_name: abtn.dataset.name,
              context_window: abtn.dataset.ctx ? parseInt(abtn.dataset.ctx) : null,
              supports_tools: abtn.dataset.tools === 'true',
              supports_streaming: abtn.dataset.streaming !== 'false',
              supports_vision: abtn.dataset.vision === 'true',
            };
            try {
              const r = await fetch('/api/models', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
              if (r.ok) {
                abtn.classList.add('added');
                abtn.textContent = 'Added';
                abtn.disabled = true;
                await this.loadAllUserModels();
                if (this.state.selectedProvider === body.provider_id) {
                  await this.loadModels(body.provider_id);
                }
              }
            } catch (e) { console.error('addModel:', e); }
          });
        });
      }
    } catch (e) {
      results.innerHTML = `<div style="font-size:12px;color:var(--danger);padding:8px;">Error: ${esc(e.message)}</div>`;
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Fetch Available Models'; }
    }
  },

  /* ── Agents ─────────────────────────────────────────────────── */
  async loadAgents() {
    try {
      const resp = await fetch('/api/agents');
      const data = await resp.json();
      this.state.agents = data.agents || [];
      this.renderAgentSelect();
    } catch (e) { console.error('loadAgents:', e); }
  },

  async loadAvailableTools() {
    try {
      const resp = await fetch('/api/tools');
      const data = await resp.json();
      this.state.availableTools = data.tools || [];
    } catch (e) { console.error('loadTools:', e); }
  },

  renderAgentSelect() {
    // Update agent dropdowns in all panel input footers — show Chitty + packages (with nested sub-agents)
    const agents = this.state.agents || [];
    document.querySelectorAll('.panel-agent-select').forEach(sel => {
      const current = sel.value;
      let html = '<option value="">Chitty</option>';
      for (const pkg of this.state.packages) {
        const pkgAgentId = 'pkg-' + pkg.name;
        // Find sub-agents that belong to this package
        const children = agents.filter(a => a.parent_agent_id === pkgAgentId);
        if (children.length > 0) {
          // Package with sub-agents — show as optgroup
          html += `<optgroup label="${esc(pkg.display_name || pkg.name)}">`;
          html += `<option value="${esc(pkgAgentId)}" ${current === pkgAgentId ? 'selected' : ''}>${esc(pkg.display_name || pkg.name)}</option>`;
          for (const child of children) {
            html += `<option value="${esc(child.id)}" ${current === child.id ? 'selected' : ''}>  \u2514 ${esc(child.name)}</option>`;
          }
          html += '</optgroup>';
        } else {
          // Package without sub-agents — flat option
          html += `<option value="${esc(pkg.name)}" ${current === pkg.name ? 'selected' : ''}>${esc(pkg.display_name || pkg.name)}</option>`;
        }
      }
      sel.innerHTML = html;
    });
    // Also update agent form provider/model selects if open
    this.updateAgentFormProviderModels();
  },

  async renderAgentsSettings() {
    const c = document.getElementById('agents-settings');
    await this.loadAvailableTools();
    await this.loadAgents();

    let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
    html += '<div class="model-section-title" style="margin:0;">Your Agents</div>';
    html += '<div style="display:flex;gap:6px;">';
    html += '<button class="discover-btn" id="create-agent-btn" style="background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border);">+ Manual</button>';
    html += '</div></div>';

    if (!this.state.agents.length) {
      html += '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">No agents yet. Create one to get started.</div>';
    }

    for (const sk of this.state.agents) {
      const tools = (sk.tools || []).join(', ') || 'all tools';
      const providerLabel = sk.preferred_provider ? this.state.providers.find(p => p.provider_id === sk.preferred_provider)?.display_name || sk.preferred_provider : null;
      const modelLabel = sk.preferred_model || null;
      const pmLine = providerLabel ? `Provider: ${esc(providerLabel)}${modelLabel ? ' / ' + esc(modelLabel) : ''}` : '';
      const approvalBadge = sk.approval_mode === 'auto'
        ? '<span style="display:inline-block;padding:1px 6px;background:#22c55e22;color:#22c55e;border-radius:3px;font-size:10px;font-weight:600;">AUTO-APPROVE</span>'
        : '<span style="display:inline-block;padding:1px 6px;background:#3b82f622;color:#3b82f6;border-radius:3px;font-size:10px;font-weight:600;">PROMPT</span>';
      html += `<div class="agent-item">
        <div class="agent-item-info">
          <div class="agent-item-name">${esc(sk.name)} ${approvalBadge}</div>
          <div class="agent-item-desc">${esc(sk.description)}</div>
          ${pmLine ? `<div class="agent-item-tags" style="color:var(--accent);">${pmLine}</div>` : ''}
          <div class="agent-item-tags">Tools: ${esc(tools)}${sk.max_iterations ? ' &middot; max ' + sk.max_iterations + ' iterations' : ''}</div>
        </div>
        <button class="agent-edit-btn" data-agent-id="${esc(sk.id)}">Edit</button>

    document.getElementById('create-agent-btn')?.addEventListener('click', () => this.showAgentForm());

  async showAgentForm(editId) {

    if (editId) {
      try {

        if (resp.ok) existing = await resp.json();
      } catch (e) { console.error('Failed to load agent:', e); }

    const container = document.getElementById('agent-form-container');

    // Load available skills from API
    let availableSkills = [];

      if (skillResp.ok) availableSkills = await skillResp.json();

    // Build skill checkboxes (grouped by source)

      const checked = agentSkills.includes(s.name);

        <input type="checkbox" value="${esc(s.name)}" ${checked ? 'checked' : ''} />
        ${esc(s.name)}

    let skillChecks = '';
    const builtIn = availableSkills.filter(s => s.source.includes('built-in') || s.source.includes('marketplace'));
    const project = availableSkills.filter(s => s.source === 'project');
    const user = availableSkills.filter(s => s.source === 'user');

    if (builtIn.length) {
      for (const s of builtIn) skillChecks += skillCheckbox(s);
    }
    if (project.length) {
      skillChecks += separator('Project Skills');
      for (const s of project) skillChecks += skillCheckbox(s);
    }
    if (user.length) {
      skillChecks += separator('Custom Skills');
      for (const s of user) skillChecks += skillCheckbox(s);
    }

    // Get existing persona (support both old "instructions" and new "persona" field)
    const existingPersona = existing?.persona || existing?.instructions || '';

    container.innerHTML = `<div class="agent-form">
      <div class="model-section-title">${existing ? 'Edit Agent' : 'Create Agent'}</div>
      <label>Name</label>
      <input id="sf-name" value="${esc(existing?.name || '')}" placeholder="e.g. Code Assistant" />
      <label>Description</label>
      <input id="sf-desc" value="${esc(existing?.description || '')}" placeholder="Short description of what this agent does" />
      <label>Persona</label>
      <textarea id="sf-persona" placeholder="Who is this agent? (e.g. 'You are a senior frontend developer focused on clean, accessible UI.')">${esc(existingPersona)}</textarea>
      <div class="hint">Keep it short — just who the agent IS. Domain expertise comes from skills.</div>
      <label>Skills</label>
      <div class="tool-checkboxes" id="sf-skills">${skillChecks || '<span style="font-size:12px;color:var(--text-muted);">No skills installed. Ask Chitty to create one, or drop a SKILL.md into ~/.chitty-workspace/skills/</span>'}</div>
      <div class="hint">Each skill brings its own tools and instructions. Leave unchecked for all skills.</div>
      <label>Default Provider &amp; Model</label>
      <div class="exec-config">
        <div class="config-field">
          <label>Provider</label>
          <select id="sf-provider" style="width:100%;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:12px;">
            <option value="">Use default</option>
            ${this.state.providers.map(p => `<option value="${p.provider_id}" ${existing?.preferred_provider === p.provider_id ? 'selected' : ''}>${esc(p.display_name)}</option>`).join('')}
          </select>
        </div>
        <div class="config-field">
          <label>Model</label>
          <select id="sf-model" style="width:100%;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:12px;">

      <div class="exec-config">
        <div class="config-field" style="flex:1;">
          <label>Approval Mode</label>
          <select id="sf-approval-mode" style="width:100%;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:12px;">
            <option value="prompt" ${(!existing || existing.approval_mode === 'prompt') ? 'selected' : ''}>Prompt for approval</option>

    const sfProvider = document.getElementById('sf-provider');
    const sfModel = document.getElementById('sf-model');
    const loadAgentFormModels = async (pid, selectedModel) => {
      if (!pid) { sfModel.innerHTML = '<option value="">Use default</option>'; return; }
      try {
        const resp = await fetch(`/api/providers/${pid}/models`);
        const data = await resp.json();
        const models = data.models || [];
        sfModel.innerHTML = '<option value="">Use default</option>' + models.map(m => {
          const val = m.model_id || m.id;
          const name = m.display_name || val;
          return `<option value="${val}" ${selectedModel === val ? 'selected' : ''}>${esc(name)}</option>`;
        }).join('');
      } catch (e) { console.error('Load models for agent form:', e); }
    };
    sfProvider.addEventListener('change', () => loadAgentFormModels(sfProvider.value, null));
    // Load models for existing agent's provider
    if (existing?.preferred_provider) loadAgentFormModels(existing.preferred_provider, existing.preferred_model);

    document.getElementById('sf-cancel').addEventListener('click', () => { container.innerHTML = ''; });
    document.getElementById('sf-save').addEventListener('click', async () => {
      const name = document.getElementById('sf-name').value.trim();
      if (!name) return alert('Name is required');

      const selectedSkills = [];
      container.querySelectorAll('#sf-skills input:checked').forEach(cb => selectedSkills.push(cb.value));

      const body = {
        name,
        description: document.getElementById('sf-desc').value.trim(),
        persona: document.getElementById('sf-persona').value,
        skills: selectedSkills,
        project_path: document.getElementById('sf-project-path').value.trim() || null,
        preferred_provider: document.getElementById('sf-provider').value || null,
        preferred_model: document.getElementById('sf-model').value || null,
        approval_mode: document.getElementById('sf-approval-mode').value || 'prompt',
        max_iterations: parseInt(document.getElementById('sf-max-iter').value) || null,
        temperature: parseFloat(document.getElementById('sf-temp').value) || null,
        max_tokens: parseInt(document.getElementById('sf-max-tokens').value) || null,
        context_budget_pct: parseInt(document.getElementById('sf-context-budget').value) || null,
        compaction_strategy: document.getElementById('sf-compaction-strategy').value || null,
        max_conversation_turns: parseInt(document.getElementById('sf-max-turns').value) || null,
      };

      const url = existing ? `/api/agents/${editId}` : '/api/agents';
      const method = existing ? 'PUT' : 'POST';

      try {
        const resp = await fetch(url, {
          method, headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (resp.ok) {
          await this.loadAgents();
          this.renderAgentSelect();
          // Refresh marketplace view if action panel is showing it
          if (document.getElementById('marketplace-body')?.style.display !== 'none') {
            this.renderMarketplacePanel();
          }
        } else {
          alert('Error saving agent: ' + await resp.text());
        }
      } catch (e) { alert('Error: ' + e.message); }
    });
  },

  /* ── Agent Builder (AI-powered) ─────────────────────────────── */
  showAgentBuilder() {
    const container = document.getElementById('builder-body');
    if (!container) return;
    this.builderState = {
      history: [],
      draft: { name: '', description: '', instructions: '', tools: [], packages: [], tags: [], max_iterations: 10, temperature: null },
      packageStatuses: {},
      sending: false,
    };

    container.innerHTML = `<div class="agent-builder-panel">
      <div class="builder-chat">
        <div class="builder-chat-messages" id="builder-messages">
          <div class="builder-msg system">Describe what you want your agent to do. I'll help you design it.</div>
        </div>
        <div class="builder-chat-input">

          <button class="builder-send-btn" id="builder-send">Send</button>
        </div>

      <div class="builder-preview" id="builder-preview">
        <h4>Agent Preview</h4>
        <div id="builder-preview-content"></div>
      </div>

      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });

      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 80) + 'px';
