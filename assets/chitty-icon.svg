<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Chitty Workspace App Icon -->
  <!-- Rounded square background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Chat bubble shape (main mark) -->
  <path d="M136 128h240c22 0 40 18 40 40v160c0 22-18 40-40 40H216l-56 48v-48h-24c-22 0-40-18-40-40V168c0-22 18-40 40-40z"
        fill="url(#accent)" opacity="0.15"/>
  <path d="M136 128h240c22 0 40 18 40 40v160c0 22-18 40-40 40H216l-56 48v-48h-24c-22 0-40-18-40-40V168c0-22 18-40 40-40z"
        stroke="url(#accent)" stroke-width="6" fill="none"/>

  <!-- "Ch" text inside bubble -->
  <text font-family="'Segoe UI', -apple-system, sans-serif" font-weight="800" font-size="140" letter-spacing="-4">
    <tspan x="145" y="310" fill="#f1f5f9">Ch</tspan>
  </text>

  <!-- Three dots (AI typing indicator) -->
  <circle cx="310" cy="210" r="10" fill="#60a5fa" opacity="0.9"/>
  <circle cx="346" cy="210" r="10" fill="#60a5fa" opacity="0.6"/>
  <circle cx="382" cy="210" r="10" fill="#60a5fa" opacity="0.3"/>
</svg>
