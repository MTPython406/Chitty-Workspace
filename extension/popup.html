<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #fafafa;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .header p {
      font-size: 11px;
      color: #a1a1aa;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.connected { background: #10b981; }
    .dot.disconnected { background: #ef4444; }
    .status-text {
      font-size: 12px;
    }
    .info {
      font-size: 11px;
      color: #71717a;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">💬</div>
    <div>
      <h1>Chitty Browser</h1>
      <p>Browser extension for Chitty Workspace</p>
    </div>
  </div>

  <div class="status" id="status">
    <span class="dot disconnected" id="status-dot"></span>
    <span class="status-text" id="status-text">Checking connection...</span>
  </div>

  <div class="info">
    Your AI agent in Chitty Workspace can control this browser — open pages, click buttons, type text, and read content. You stay in control and can interact anytime.
  </div>

  <script src="popup.js"></script>
</body>
</html>
